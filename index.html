<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster PRO - Engineering Mastery</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800;900&display=swap');
        
        :root { 
            --primary: #3b82f6; 
            --success: #10b981; 
            --error: #ef4444;
            --bg: #020617;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #f8fafc;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Estilo Duolingo-Pro */
        .node {
            width: 80px;
            height: 80px;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 10;
            border-bottom: 6px solid rgba(0,0,0,0.3);
        }

        .node:active { transform: translateY(4px); border-bottom-width: 0; }

        .node-locked { background: #1e293b; color: #475569; border-color: #0f172a; cursor: not-allowed; }
        .node-current { background: var(--primary); color: white; border-color: #1d4ed8; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .node-completed { background: var(--success); color: white; border-color: #059669; }

        /* Líneas conectoras */
        .path-line {
            position: absolute;
            width: 4px;
            background: #1e293b;
            z-index: 1;
        }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .feedback-panel { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Pantalla de Autenticación -->
    <div id="auth-view" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-md space-y-8 text-center">
            <div class="inline-block p-4 bg-blue-600 rounded-[2rem] shadow-2xl shadow-blue-500/20 mb-4">
                <i class="fas fa-microchip text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">ElectroMaster<span class="text-blue-500">PRO</span></h1>
            <p class="text-slate-400">Ingeniería Electrónica Universitaria</p>
            
            <div class="space-y-4 pt-8">
                <input id="auth-email" type="email" placeholder="Email Institucional" class="w-full bg-slate-900 p-5 rounded-2xl border border-white/10 outline-none focus:border-blue-500 transition-all">
                <input id="auth-pass" type="password" placeholder="Contraseña" class="w-full bg-slate-900 p-5 rounded-2xl border border-white/10 outline-none focus:border-blue-500 transition-all">
                <button onclick="actions.login()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black uppercase rounded-2xl shadow-lg transition-all active:scale-95">Ingresar al Sistema</button>
                <div class="flex gap-2">
                    <button onclick="actions.loginAnon()" class="flex-grow py-3 bg-slate-800 rounded-xl text-xs font-bold uppercase opacity-70">Modo Invitado</button>
                    <button onclick="actions.register()" class="flex-grow py-3 bg-slate-800 rounded-xl text-xs font-bold uppercase opacity-70">Crear Cuenta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Principal -->
    <div id="main-ui" class="hidden">
        <!-- Header Fijo -->
        <nav class="fixed top-0 left-0 right-0 z-50 glass px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="router.go('dashboard')" class="text-xl font-black italic tracking-tighter">E<span class="text-blue-500">M</span></button>
                <div class="h-8 w-[1px] bg-white/10 mx-2"></div>
                <div class="flex items-center gap-2 text-orange-500 font-black">
                    <i class="fas fa-bolt"></i> <span id="user-xp">0</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="nav-streak" class="flex items-center gap-2 text-red-500 font-black">
                    <i class="fas fa-fire"></i> <span>1</span>
                </div>
                <button onclick="actions.logout()" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-slate-400">
                    <i class="fas fa-user text-sm"></i>
                </button>
            </div>
        </nav>

        <!-- Contenedor de Vistas -->
        <div id="view-container" class="pt-24 pb-32 px-6"></div>

        <!-- Feedback Overlay (Duo Style) -->
        <div id="feedback-overlay" class="fixed inset-0 z-[60] bg-black/60 hidden flex flex-col justify-end">
            <div id="feedback-content" class="w-full p-8 rounded-t-[3rem] feedback-panel">
                <!-- Contenido dinámico aquí -->
            </div>
        </div>
    </div>

    <!-- Script de Datos y Lógica -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBUF4X4OvGKdaUOdxtD0Eyj4F1GY-__NOQ",
            authDomain: "electromaster-f2a7a.firebaseapp.com",
            projectId: "electromaster-f2a7a",
            storageBucket: "electromaster-f2a7a.firebasestorage.app",
            messagingSenderId: "757265026642",
            appId: "1:757265026642:web:dddb40ce77e296358c198b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "electromaster-pro-v1";

        // CONTENIDO ACADÉMICO (Fases Reales)
        const CONTENT = [
            {
                id: 'f1',
                title: 'Fundamentos DC',
                icon: 'fa-bolt',
                levels: [
                    {
                        id: 'l1_1',
                        title: 'Ley de Ohm',
                        questions: [
                            {
                                q: "¿Si aumentamos la resistencia en un circuito manteniendo el voltaje constante, qué sucede con la intensidad?",
                                o: ["Aumenta proporcionalmente", "Disminuye", "Se mantiene igual"],
                                a: 1,
                                explain: "Según la Ley de Ohm ($I = V / R$), la corriente es inversamente proporcional a la resistencia. A mayor oposición, menor flujo de electrones."
                            },
                            {
                                q: "Calcula la potencia disipada por una resistencia de $10\Omega$ con una corriente de $2A$.",
                                o: ["$20W$", "$40W$", "$5W$"],
                                a: 1,
                                explain: "Usamos la fórmula $P = I^2 \cdot R$. Entonces: $2^2 \cdot 10 = 4 \cdot 10 = 40$ Vatios."
                            }
                        ]
                    },
                    {
                        id: 'l1_2',
                        title: 'Leyes de Kirchhoff',
                        questions: [
                            {
                                q: "¿Qué establece la Primera Ley de Kirchhoff (Leyes de Corrientes)?",
                                o: ["La suma de voltajes es cero", "La suma de corrientes que entran a un nodo es igual a las que salen", "La energía no se crea ni se destruye"],
                                a: 1,
                                explain: "Es el principio de conservación de la carga. En un nodo, toda la corriente que llega debe salir por alguna rama."
                            }
                        ]
                    }
                ]
            },
            {
                id: 'f2',
                title: 'Semiconductores',
                icon: 'fa-microchip',
                levels: [
                    {
                        id: 'l2_1',
                        title: 'Diodos y Rectificación',
                        questions: [
                            {
                                q: "¿Cuál es el voltaje de barrera típico de un diodo de Silicio en polarización directa?",
                                o: ["$0.3V$", "$0.7V$", "$1.2V$"],
                                a: 1,
                                explain: "El Silicio requiere aproximadamente $0.7V$ para vencer la zona de deplexión, mientras que el Germanio requiere $0.3V$."
                            }
                        ]
                    }
                ]
            }
        ];

        // ESTADO GLOBAL
        window.state = {
            user: null,
            activeView: 'dashboard',
            currentLevel: null,
            currentQuestionIdx: 0
        };

        // ACCIONES
        window.actions = {
            async login() {
                const e = document.getElementById('auth-email').value;
                const p = document.getElementById('auth-pass').value;
                try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert(err.message); }
            },
            async loginAnon() { try { await signInAnonymously(auth); } catch(err) { alert(err.message); } },
            async register() {
                const e = document.getElementById('auth-email').value;
                const p = document.getElementById('auth-pass').value;
                try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert(err.message); }
            },
            async logout() { await signOut(auth); location.reload(); },
            
            async saveProgress() {
                if (!state.user) return;
                const userRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'profile', 'data');
                await updateDoc(userRef, {
                    xp: state.user.xp,
                    completed: state.user.completed,
                    streak: state.user.streak
                });
            }
        };

        // ROUTER
        window.router = {
            go(view, params = null) {
                state.activeView = view;
                if (params) state.params = params;
                render();
            }
        };

        // LOGICA DE QUIZ
        window.quiz = {
            start(levelId) {
                let level = null;
                CONTENT.forEach(f => {
                    const found = f.levels.find(l => l.id === levelId);
                    if (found) level = found;
                });
                state.currentLevel = level;
                state.currentQuestionIdx = 0;
                router.go('quiz');
            },

            check(idx) {
                const q = state.currentLevel.questions[state.currentQuestionIdx];
                const isCorrect = idx === q.a;
                
                const overlay = document.getElementById('feedback-overlay');
                const content = document.getElementById('feedback-content');
                
                overlay.classList.remove('hidden');
                content.className = `w-full p-8 rounded-t-[3rem] feedback-panel ${isCorrect ? 'bg-emerald-500' : 'bg-rose-500'}`;
                
                content.innerHTML = `
                    <div class="max-w-md mx-auto space-y-4">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center text-2xl">
                                <i class="fas ${isCorrect ? 'fa-check' : 'fa-times'}"></i>
                            </div>
                            <h2 class="text-2xl font-black uppercase italic">${isCorrect ? '¡Excelente Ingeniero!' : 'Error de Sistema'}</h2>
                        </div>
                        <div class="bg-black/10 p-4 rounded-2xl">
                            <p class="text-sm font-semibold mb-1 uppercase opacity-70">Explicación Técnica:</p>
                            <p class="text-white leading-relaxed">${q.explain}</p>
                        </div>
                        <button onclick="quiz.next(${isCorrect})" class="w-full py-4 bg-white ${isCorrect ? 'text-emerald-600' : 'text-rose-600'} font-black uppercase rounded-2xl shadow-xl active:scale-95 transition-all">
                            Siguiente Pregunta
                        </button>
                    </div>
                `;

                if (isCorrect) {
                    confetti({ particleCount: 40, spread: 70, origin: { y: 0.9 }, colors: ['#10b981', '#ffffff'] });
                }
            },

            async next(wasCorrect) {
                document.getElementById('feedback-overlay').classList.add('hidden');
                
                if (wasCorrect) state.user.xp += 50;

                if (state.currentQuestionIdx + 1 < state.currentLevel.questions.length) {
                    state.currentQuestionIdx++;
                    render();
                } else {
                    // Nivel terminado
                    if (!state.user.completed.includes(state.currentLevel.id)) {
                        state.user.completed.push(state.currentLevel.id);
                        state.user.xp += 200;
                    }
                    await actions.saveProgress();
                    router.go('dashboard');
                }
            }
        };

        // RENDERIZADO
        function render() {
            const container = document.getElementById('view-container');
            document.getElementById('user-xp').innerText = state.user?.xp || 0;

            if (state.activeView === 'dashboard') {
                container.innerHTML = `
                    <div class="space-y-12 max-w-lg mx-auto pb-20">
                        ${CONTENT.map((phase, pIdx) => `
                            <div class="space-y-8 relative">
                                <div class="text-center">
                                    <h2 class="text-xs font-black text-blue-500 uppercase tracking-[0.3em] mb-2">${phase.title}</h2>
                                    <div class="h-1 w-12 bg-blue-600 mx-auto rounded-full"></div>
                                </div>
                                
                                <div class="flex flex-col items-center gap-12 relative">
                                    ${phase.levels.map((level, lIdx) => {
                                        const isDone = state.user.completed.includes(level.id);
                                        const isLocked = lIdx > 0 && !state.user.completed.includes(phase.levels[lIdx-1].id) && !isDone;
                                        
                                        // Zig-zag offset
                                        const offset = (lIdx % 2 !== 0) ? 'translate-x-12' : '-translate-x-12';

                                        return `
                                            <div class="relative group ${offset}">
                                                <div onclick="${isLocked ? '' : `quiz.start('${level.id}')`}" 
                                                     class="node ${isDone ? 'node-completed' : (isLocked ? 'node-locked' : 'node-current')}">
                                                    <i class="fas ${isDone ? 'fa-check' : phase.icon}"></i>
                                                    
                                                    <!-- Tooltip de Titulo -->
                                                    <div class="absolute -top-12 left-1/2 -translate-x-1/2 bg-slate-800 px-3 py-1 rounded-lg text-[10px] font-black uppercase whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none border border-white/10">
                                                        ${level.title}
                                                    </div>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (state.activeView === 'quiz') {
                const q = state.currentLevel.questions[state.currentQuestionIdx];
                container.innerHTML = `
                    <div class="max-w-md mx-auto space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-500">
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                <span>Progreso de Fase</span>
                                <span>${state.currentQuestionIdx + 1} / ${state.currentLevel.questions.length}</span>
                            </div>
                            <div class="h-3 w-full bg-slate-900 rounded-full overflow-hidden p-1">
                                <div class="h-full bg-blue-500 rounded-full transition-all duration-700" style="width: ${((state.currentQuestionIdx + 1) / state.currentLevel.questions.length) * 100}%"></div>
                            </div>
                        </div>

                        <div class="glass p-8 rounded-[2.5rem] space-y-6">
                            <h3 class="text-2xl font-bold leading-snug font-mono">${q.q}</h3>
                            <div class="space-y-3">
                                ${q.o.map((opt, i) => `
                                    <button onclick="quiz.check(${i})" class="w-full text-left p-5 rounded-2xl border-2 border-slate-700 hover:border-blue-500 hover:bg-blue-500/5 transition-all font-semibold flex items-center justify-between group active:scale-[0.98]">
                                        <span>${opt}</span>
                                        <i class="fas fa-chevron-right text-xs opacity-0 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0 transition-all"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        
                        <button onclick="router.go('dashboard')" class="w-full py-4 text-slate-500 font-bold uppercase text-xs tracking-widest hover:text-white transition-colors">
                            Abandonar Protocolo
                        </button>
                    </div>
                `;
            }
        }

        // AUTH LISTENER
        onAuthStateChanged(auth, async (user) => {
            const authView = document.getElementById('auth-view');
            const mainUI = document.getElementById('main-ui');

            if (user) {
                authView.classList.add('hidden');
                mainUI.classList.remove('hidden');
                
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    state.user = snap.data();
                } else {
                    state.user = { xp: 0, completed: [], streak: 1, name: user.email?.split('@')[0] || 'Ingeniero' };
                    await setDoc(userRef, state.user);
                }
                render();
            } else {
                authView.classList.remove('hidden');
                mainUI.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
