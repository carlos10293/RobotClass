<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster - Certificación Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white;
            user-select: none;
            overflow-x: hidden;
        }

        .node-active { background: #1cb0f6; border-bottom: 6px solid #1a8cc4; box-shadow: 0 0 20px rgba(28, 176, 246, 0.3); }
        .node-done { background: #58cc02; border-bottom: 6px solid #46a302; }
        .node-locked { background: #334155; border-bottom: 6px solid #1e293b; color: #64748b; cursor: not-allowed; }

        .option-card {
            border: 2px solid #334155;
            transition: all 0.2s ease;
        }

        .option-selected { 
            border-color: #1cb0f6; 
            background: rgba(28,176,246,0.1); 
            transform: translateY(-2px);
        }
        
        .feedback-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1);
            z-index: 100;
        }

        .feedback-show { transform: translateY(0); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed top-0 w-full bg-[#0f172a]/95 backdrop-blur-md border-b border-slate-800 z-50 p-4 max-w-2xl mx-auto left-1/2 -translate-x-1/2">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <i class="fas fa-bolt text-yellow-400 mr-1"></i>
                    <span id="stat-xp" class="font-bold text-sm text-slate-200">0 XP</span>
                </div>
            </div>
            <div class="bg-rose-500/10 px-3 py-1 rounded-full border border-rose-500/30 text-rose-500 font-bold">
                <i class="fas fa-heart mr-1"></i>
                <span id="stat-lives">5</span>
            </div>
        </div>
        <div class="w-full h-1.5 bg-slate-800 mt-4 rounded-full overflow-hidden">
            <div id="master-progress" class="h-full bg-cyan-500 transition-all duration-1000" style="width: 0%"></div>
        </div>
    </nav>

    <main id="view-map" class="pt-28 pb-32 max-w-2xl mx-auto px-6 text-center">
        <h1 class="text-3xl font-extrabold mb-2">Ruta de Maestría</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-10">Certificación Técnica e Industrial</p>
        <div id="map-container" class="flex flex-col items-center gap-12"></div>
    </main>

    <div id="view-quiz" class="fixed inset-0 bg-[#0f172a] z-[60] hidden flex flex-col max-w-2xl mx-auto">
        <header class="p-6 flex items-center gap-4">
            <button onclick="exitQuiz()" class="text-slate-400 text-xl p-2"><i class="fas fa-times"></i></button>
            <div class="flex-1 h-2.5 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                <div id="quiz-progress-bar" class="h-full bg-emerald-400 transition-all duration-300" style="width: 0%"></div>
            </div>
        </header>
        <main class="flex-1 p-8 overflow-y-auto">
            <div id="question-content" class="max-w-md mx-auto"></div>
        </main>
        <div id="feedback-panel" class="feedback-panel p-6 border-t border-slate-800 shadow-2xl"></div>
    </div>

    <script>
        const QUESTIONS_DATA = [
            // ... (Preguntas 1-30 omitidas por brevedad para centrarse en las nuevas)
            // NIVEL 6-10 previamente cargados...
            { id: 31, q: "¿Diferencia entre motor CC y CA?", opts: ["Motor CC ofrece control preciso; CA es más robusto y económico", "Opción B", "Opción C", "Opción D"], ans: 0, why: "CC usa escobillas para control fino; CA es estándar por durabilidad." },
            // ... (Asumiendo que los IDs 31-50 ya existen)

            // NIVEL 10 (Continuación/Corrección ID 55)
            {
                id: 55,
                q: "¿Qué es la ciberseguridad en industrias y por qué es importante?",
                opts: [
                    "Conjunto de medidas para proteger sistemas, datos y redes industriales contra amenazas digitales; evita paradas de producción",
                    "Es solo la protección de equipos informáticos; no incluye procesos",
                    "Es un sistema de seguridad física",
                    "No es relevante en industrias modernas"
                ],
                ans: 0,
                why: "La ciberseguridad industrial previene ataques a sistemas de control y sabotaje digital, garantizando la continuidad del proceso."
            },

            // NIVEL 11 (Preguntas 51-55 - Reinicio de bloque según usuario)
            {
                id: 510, // Usamos un offset para no colisionar con IDs anteriores si fuera necesario, pero mantendremos tu lógica de "Nivel 11"
                q: "¿Qué es un sistema de control en cascada y cuándo se usa?",
                opts: [
                    "Comprende dos o más bucles de control donde la salida de uno es la referencia de otro; mejora precisión",
                    "Un solo bucle para varias variables",
                    "Sistema de emergencia",
                    "No se usa en industrias"
                ],
                ans: 0,
                why: "Se aplica en procesos como regulación de temperatura en calderas donde el control de un parámetro depende del ajuste de otro."
            },
            {
                id: 520,
                q: "¿Diferencia entre control en tiempo real y por lotes?",
                opts: [
                    "Tiempo real: ajustes continuos; lotes: procesos en etapas predefinidas",
                    "Lotes: ajustes continuos; tiempo real: etapas",
                    "Son iguales",
                    "Tiempo real es doméstico"
                ],
                ans: 0,
                why: "Tiempo real es para robots y precisión instantánea; lotes para química o alimentos en tandas."
            },
            {
                id: 530,
                q: "¿Qué es un regulador de voltaje?",
                opts: [
                    "Mantiene el voltaje dentro de rangos nominales; protege contra sobrevoltajes",
                    "Aumenta el voltaje siempre",
                    "Almacena energía",
                    "No es industrial"
                ],
                ans: 0,
                why: "Evita daños en motores y PLCs ante inestabilidad de la red eléctrica."
            },
            {
                id: 540,
                q: "¿Qué es la automatización flexible?",
                opts: [
                    "Permite adaptar procesos a cambios en productos o volúmenes; reduce tiempos de cambio",
                    "Automatización de procesos fijos",
                    "Solo para pequeñas industrias",
                    "No existe"
                ],
                ans: 0,
                why: "Facilita la producción de múltiples referencias en una misma línea sin grandes reinversiones."
            },
            {
                id: 550,
                q: "¿Qué es un sistema de manejo de materiales?",
                opts: [
                    "Transporte, almacenamiento y control de piezas; optimiza tiempos y reduce esfuerzo manual",
                    "Sistema de fabricación de componentes",
                    "Sistema de seguridad física",
                    "No es industrial"
                ],
                ans: 0,
                why: "Garantiza el flujo continuo entre etapas de producción reduciendo errores humanos."
            },

            // NIVEL 12 (Preguntas 56-60)
            {
                id: 56,
                q: "¿Qué es la ingeniería de procesos industriales?",
                opts: [
                    "Diseña, optimiza y opera sistemas de producción; aplica en química, farmacéutica y energía",
                    "Fabricación de equipos solamente",
                    "Gestión de personal exclusivamente",
                    "No es una disciplina"
                ],
                ans: 0,
                why: "Transforma materias primas en productos finales garantizando eficiencia y calidad."
            },
            {
                id: 57,
                q: "¿Diferencia entre proceso continuo y discontinuo?",
                opts: [
                    "Continuo: sin interrupciones (petróleo); discontinuo: en lotes o tandas (medicamentos)",
                    "Discontinuo: sin parar",
                    "Son iguales",
                    "Uso doméstico"
                ],
                ans: 0,
                why: "El continuo es para grandes volúmenes homogéneos; el discontinuo ofrece flexibilidad."
            },
            {
                id: 58,
                q: "¿Qué es un diagrama de flujo de procesos (DFP)?",
                opts: [
                    "Representa gráficamente las etapas de un proceso; facilita diseño y mejora",
                    "Diagrama eléctrico de conexiones",
                    "Plan de instalación física",
                    "No es útil"
                ],
                ans: 0,
                why: "Muestra flujos de materiales y equipos para identificar cuellos de botella."
            },
            {
                id: 59,
                q: "¿Qué es la gestión de calidad industrial?",
                opts: [
                    "Garantiza que productos cumplan especificaciones; mejora continua y decisiones basadas en datos",
                    "Inspección final únicamente",
                    "Gestión de recursos humanos",
                    "No es un requisito"
                ],
                ans: 0,
                why: "Reduce defectos y aumenta satisfacción aplicando estándares como ISO 9001."
            },
            {
                id: 60,
                q: "¿Qué es la seguridad industrial?",
                opts: [
                    "Conjunto de medidas para prevenir riesgos a personas y equipos; incluye EPP y procedimientos",
                    "Protección de equipos únicamente",
                    "Seguridad informática",
                    "No es necesaria hoy"
                ],
                ans: 0,
                why: "Identifica riesgos y capacita operarios para prevenir accidentes en planta."
            },

            // NIVEL 13 (Preguntas 61-65)
            {
                id: 61,
                q: "¿Mantenimiento predictivo vs preventivo?",
                opts: [
                    "Predictivo: usa datos para predecir fallos; preventivo: es programado periódicamente",
                    "Preventivo predice fallos",
                    "Son iguales",
                    "Predictivo es doméstico"
                ],
                ans: 0,
                why: "El predictivo analiza vibraciones o temperatura para actuar justo antes del fallo."
            },
            {
                id: 62,
                q: "¿Qué es la gestión de la fiabilidad?",
                opts: [
                    "Estrategias para maximizar tiempo de operación útil; incluye diseño y monitoreo",
                    "Reparación de equipos dañados solamente",
                    "Gestión de personal",
                    "No es relevante"
                ],
                ans: 0,
                why: "Busca minimizar paradas no programadas en equipos críticos."
            },
            {
                id: 63,
                q: "¿Qué es un sistema de gestión de energía?",
                opts: [
                    "Optimiza consumo, generación y almacenamiento; reduce costos y emisiones",
                    "Sistema de generación eléctrica solamente",
                    "Sistema de iluminación",
                    "No es útil"
                ],
                ans: 0,
                why: "Permite una operación más verde y rentable mediante la medición y control del consumo."
            },
            {
                id: 64,
                q: "¿Qué son las energías renovables industriales?",
                opts: [
                    "Generada de fuentes naturales; solar, eólica, biomasa; reduce fósiles",
                    "Energías tradicionales con otro nombre",
                    "Solo para hogares",
                    "Energía nuclear únicamente"
                ],
                ans: 0,
                why: "La solar y eólica reducen la huella de carbono y el gasto operativo a largo plazo."
            },
            {
                id: 65,
                q: "¿Qué es la sostenibilidad industrial?",
                opts: [
                    "Equilibra producción con protección ambiental; reducción de residuos y eficiencia",
                    "Reducción de costos solamente",
                    "Producción masiva sin límites",
                    "Concepto no aplicable"
                ],
                ans: 0,
                why: "Busca procesos limpios y reutilización de materiales para un futuro viable."
            }
        ];

        // Lógica de Niveles
        const LEVELS = [];
        for(let i = 0; i < 90; i++) {
            LEVELS.push({
                id: i + 1,
                title: `Nivel ${i + 1}`,
                range: `Q${ (i * 5) + 1 }-Q${ (i * 5) + 5 }`,
                questions: QUESTIONS_DATA.slice(i * 5, (i * 5) + 5)
            });
        }

        let state = {
            xp: 0,
            lives: 5,
            completed: JSON.parse(localStorage.getItem('ind_master_v2') || '[]'),
            activeLevel: null,
            currentQIdx: 0,
            selectedIdx: null
        };

        function renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            
            LEVELS.forEach((lvl, idx) => {
                if(lvl.questions.length === 0 && idx > 15) return; // No mostrar niveles vacíos lejanos
                
                const done = state.completed.includes(lvl.id);
                const locked = idx > 0 && !state.completed.includes(LEVELS[idx-1].id);
                const status = done ? 'node-done' : (locked ? 'node-locked' : 'node-active');
                const x = Math.sin(idx * 0.8) * 40;

                container.innerHTML += `
                    <div class="flex flex-col items-center" style="transform: translateX(${x}px)">
                        <div onclick="startLevel(${lvl.id})" class="w-16 h-14 rounded-full flex items-center justify-center cursor-pointer transition-transform active:scale-90 ${status}">
                            <i class="fas ${done ? 'fa-check' : 'fa-bolt'} text-xl"></i>
                        </div>
                        <div class="text-center mt-2">
                            <span class="block text-[10px] font-black text-white leading-none">${lvl.title}</span>
                            <span class="text-[8px] font-bold text-slate-500 uppercase">${lvl.range}</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('master-progress').style.width = `${(state.completed.length / 90) * 100}%`;
        }

        window.startLevel = (id) => {
            const lvl = LEVELS.find(l => l.id === id);
            const idx = LEVELS.indexOf(lvl);
            if(idx > 0 && !state.completed.includes(LEVELS[idx-1].id)) return;
            if(state.lives <= 0) return;

            state.activeLevel = lvl;
            state.currentQIdx = 0;
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            renderQuestion();
        };

        function renderQuestion() {
            const q = state.activeLevel.questions[state.currentQIdx];
            const pct = (state.currentQIdx / 5) * 100;
            document.getElementById('quiz-progress-bar').style.width = `${pct}%`;
            state.selectedIdx = null;

            document.getElementById('question-content').innerHTML = `
                <p class="text-cyan-400 text-[10px] font-black tracking-widest mb-2 uppercase">Certificación Profesional</p>
                <h2 class="text-xl font-bold mb-8 leading-tight">${q.q}</h2>
                <div class="space-y-3">
                    ${q.opts.map((o, i) => `
                        <div onclick="selectOpt(${i})" id="opt-${i}" class="option-card p-4 rounded-xl font-bold bg-slate-800/50 cursor-pointer hover:bg-slate-800">
                            <span class="text-slate-500 mr-2">${String.fromCharCode(65 + i)}</span> ${o}
                        </div>
                    `).join('')}
                </div>
            `;
            updateFeedback('idle');
        }

        window.selectOpt = (idx) => {
            state.selectedIdx = idx;
            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('option-selected'));
            document.getElementById(`opt-${idx}`).classList.add('option-selected');
            document.getElementById('feedback-panel').classList.add('feedback-show');
            updateFeedback('ready');
        };

        function updateFeedback(mode, correct = false) {
            const panel = document.getElementById('feedback-panel');
            if(mode === 'idle') {
                panel.classList.remove('feedback-show');
                return;
            }
            if(mode === 'ready') {
                panel.style.background = "#1e293b";
                panel.innerHTML = `<button onclick="verify()" class="w-full py-4 bg-sky-500 text-white rounded-xl font-black uppercase tracking-widest">Verificar Respuesta</button>`;
            } else {
                const q = state.activeLevel.questions[state.currentQIdx];
                panel.style.background = correct ? "#064e3b" : "#7f1d1d";
                panel.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex gap-3 text-white">
                            <i class="fas fa-${correct ? 'check-circle' : 'exclamation-triangle'} text-2xl"></i>
                            <div>
                                <h3 class="font-black text-sm">${correct ? 'EXCELENTE' : 'REVISIÓN TÉCNICA'}</h3>
                                <p class="text-[11px] opacity-90 leading-tight mt-1">${q.why}</p>
                            </div>
                        </div>
                        <button onclick="nextQ()" class="w-full py-4 bg-white text-slate-900 rounded-xl font-black uppercase">Siguiente</button>
                    </div>
                `;
            }
        }

        window.verify = () => {
            const q = state.activeLevel.questions[state.currentQIdx];
            const ok = state.selectedIdx === q.ans;
            if(ok) {
                state.xp += 15;
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.9 } });
            } else {
                state.lives--;
            }
            updateStats();
            updateFeedback('result', ok);
        };

        window.nextQ = () => {
            if(state.currentQIdx < 4) {
                state.currentQIdx++;
                renderQuestion();
            } else {
                state.completed.push(state.activeLevel.id);
                localStorage.setItem('ind_master_v2', JSON.stringify(state.completed));
                exitQuiz();
                renderMap();
            }
        };

        function updateStats() {
            document.getElementById('stat-xp').innerText = `${state.xp} XP`;
            document.getElementById('stat-lives').innerText = state.lives;
            if(state.lives <= 0) {
                alert("Has agotado tus intentos. El sistema se reiniciará.");
                location.reload();
            }
        }

        function exitQuiz() {
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
        }

        window.onload = renderMap;
    </script>
</body>
</html>
