<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster V3 - Pro Learning</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=JetBrains+Mono&display=swap');
        
        :root {
            --primary: #3b82f6;
            --success: #58cc02;
            --error: #ff4b4b;
            --warning: #ffc800;
            --bg-dark: #0f172a;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-dark); 
            color: white;
            user-select: none;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .node {
            width: 85px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 8px solid rgba(0,0,0,0.3);
            z-index: 10;
        }

        .node:active { transform: translateY(4px); border-bottom-width: 4px; }
        .node-locked { background: #334155; color: #64748b; cursor: not-allowed; border-bottom: 8px solid #1e293b; }
        .node-active { background: var(--primary); color: white; border-bottom-color: #1d4ed8; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .node-completed { background: var(--success); color: white; border-bottom-color: #46a302; }

        .path-line {
            position: absolute;
            width: 4px;
            background: #334155;
            z-index: 1;
            transform-origin: top center;
        }

        .option-btn {
            background: #1e293b;
            border: 2px solid #334155;
            border-bottom: 5px solid #334155;
            transition: all 0.1s;
        }

        .option-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        .option-btn.selected { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        
        .feedback-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        .feedback-panel.show { transform: translateY(0); }

        @keyframes heart-pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .heart-pop { animation: heart-pop 0.3s ease-out; }

        /* Scrollbar hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="no-scrollbar">

    <!-- Top Navigation -->
    <nav class="fixed top-0 left-0 right-0 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-40 px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-bolt text-yellow-400 text-xl"></i>
                <span id="stat-xp" class="font-black text-lg">0</span>
            </div>
            <div class="flex-1 mx-8 h-3 bg-slate-800 rounded-full overflow-hidden">
                <div id="master-progress" class="h-full bg-gradient-to-r from-blue-500 to-cyan-400 transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="flex items-center space-x-2">
                <i id="heart-icon" class="fas fa-heart text-red-500 text-xl"></i>
                <span id="stat-lives" class="font-black text-lg">5</span>
            </div>
        </div>
    </nav>

    <!-- Main Map View -->
    <main id="view-map" class="pt-24 pb-32 min-h-screen relative flex flex-col items-center">
        <!-- Content will be injected by JS -->
    </main>

    <!-- Quiz View (Hidden by default) -->
    <section id="view-quiz" class="fixed inset-0 bg-slate-950 z-50 hidden flex flex-col">
        <header class="p-4 flex items-center justify-between border-b border-slate-900">
            <button onclick="ui.exitQuiz()" class="text-slate-400 text-2xl p-2"><i class="fas fa-times"></i></button>
            <div class="flex-1 mx-4 h-2 bg-slate-900 rounded-full">
                <div id="quiz-progress" class="h-full bg-green-500 rounded-full transition-all" style="width: 0%"></div>
            </div>
            <div class="w-10"></div>
        </header>

        <div id="quiz-content" class="flex-1 overflow-y-auto p-6 flex flex-col max-w-xl mx-auto w-full">
            <!-- Questions injected here -->
        </div>

        <div id="quiz-footer" class="p-6 border-t border-slate-900 bg-slate-950">
            <button id="check-btn" onclick="quizEngine.checkAnswer()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black uppercase tracking-widest border-b-4 border-blue-800 transition-all active:translate-y-1 active:border-b-0">
                Comprobar
            </button>
        </div>
    </section>

    <!-- Feedback Panel -->
    <div id="feedback-panel" class="feedback-panel">
        <div class="max-w-xl mx-auto flex flex-col space-y-4">
            <div class="flex items-center space-x-4">
                <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center text-2xl"></div>
                <h3 id="feedback-title" class="text-2xl font-black"></h3>
            </div>
            <p id="feedback-text" class="text-lg opacity-90"></p>
            <button onclick="quizEngine.nextQuestion()" class="w-full py-4 rounded-2xl font-black uppercase tracking-widest text-white shadow-lg transition-all active:scale-95">
                Continuar
            </button>
        </div>
    </div>

    <!-- Certification Modal -->
    <div id="cert-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-sm w-full text-center space-y-6">
            <div class="text-6xl text-yellow-500 animate-bounce">🏆</div>
            <h2 class="text-3xl font-black uppercase italic">¡Nivel Superado!</h2>
            <p class="text-slate-400">Has demostrado maestría en este módulo. ¿Deseas descargar tu certificado?</p>
            <div class="flex flex-col space-y-3">
                <button onclick="certificateLogic.download()" class="w-full py-4 bg-green-600 rounded-xl font-bold flex items-center justify-center space-x-2">
                    <i class="fas fa-file-pdf"></i> <span>Descargar PDF</span>
                </button>
                <button onclick="ui.closeCert()" class="w-full py-4 bg-slate-800 rounded-xl font-bold">Volver al Mapa</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE ---
        const LEVELS = [

                    { q: "Unidad de la resistencia eléctrica:", o: ["Ohmio","Faradio","Henrio"], a: "Ohmio", correctText: "Bien, la resistencia se mide en Ohmios (Ω).", wrongText: "Error, la resistencia se mide en Ohmios (Ω)." },
                    { q: "¿Para qué sirve un diodo rectificador?", o: ["Amplificar","Convertir AC a DC","Subir voltaje"], a: "Convertir AC a DC", correctText: "Exacto, convierte corriente alterna en corriente continua.", wrongText: "No, un diodo rectificador convierte AC en DC." },
                    { q: "¿Qué componente almacena energía en un campo magnético?", o: ["Resistencia","Inductor","Capacitor"], a: "Inductor", correctText: "Correcto, los inductores almacenan energía en campos magnéticos.", wrongText: "Incorrecto, el componente que almacena energía en un campo magnético es un inductor." },
                    { q: "Símbolo de un capacitor:", o: ["| |","--|","--o--"], a: "| |", correctText: "Exacto, este símbolo representa un capacitor.", wrongText: "No, el símbolo correcto de un capacitor es | |." },
                    { q: "¿Qué hace un resistor en un circuito?", o: ["Limita corriente","Aumenta voltaje","Almacena energía"], a: "Limita corriente", correctText: "Correcto, un resistor limita la corriente según la Ley de Ohm.", wrongText: "Error, un resistor limita la corriente en un circuito." },
                    { q: "Unidad del capacitor:", o: ["Faradio","Henrio","Ohmio"], a: "Faradio", correctText: "Correcto, la unidad de un capacitor es el Faradio (F).", wrongText: "Incorrecto, los capacitores se miden en Faradios." },
                    { q: "Unidad de inductancia:", o: ["Ohmio","Henrio","Faradio"], a: "Henrio", correctText: "Bien, los inductores se miden en Henrios (H).", wrongText: "Error, la inductancia se mide en Henrios (H)." },
                    { q: "¿Qué hace un LED?", o: ["Emite luz","Almacena energía","Amplifica"], a: "Emite luz", correctText: "Exacto, un LED emite luz cuando pasa corriente.", wrongText: "No, un LED es un diodo que emite luz al pasar corriente." },
                    { q: "Símbolo de diodo:", o: ["→|","||","--"], a: "→|", correctText: "Correcto, este es el símbolo de un diodo.", wrongText: "No, el símbolo correcto de un diodo es →|." }

            {

                    { q: "Ley de Ohm:", o: ["V=IR","P=VI","E=MC2"], a: "V=IR", correctText: "Bien, la Ley de Ohm establece que V=IR.", wrongText: "Incorrecto, la Ley de Ohm es V=IR." },
                    { q: "¿Qué es un circuito en serie?", o: ["Resistencias consecutivas","Resistencias paralelas","Un solo resistor"], a: "Resistencias consecutivas", correctText: "Exacto, en serie los componentes se conectan uno tras otro.", wrongText: "No, en serie los componentes se conectan uno tras otro." },
                    { q: "¿Qué es un circuito en paralelo?", o: ["Resistencias consecutivas","Resistencias con mismos nodos","Un solo resistor"], a: "Resistencias con mismos nodos", correctText: "Correcto, en paralelo los extremos se conectan a los mismos nodos.", wrongText: "Incorrecto, en paralelo los componentes comparten nodos de conexión." },
                    { q: "¿Qué hace un transformador?", o: ["Convierte voltaje","Almacena energía","Resiste corriente"], a: "Convierte voltaje", correctText: "Exacto, un transformador sube o baja voltaje en AC.", wrongText: "No, un transformador cambia el nivel de voltaje en corriente alterna." },
                    { q: "¿Qué indica la potencia eléctrica?", o: ["Velocidad de electrones","Energía por tiempo","Resistencia"], a: "Energía por tiempo", correctText: "Bien, la potencia es energía por unidad de tiempo (P=VI).", wrongText: "Incorrecto, la potencia indica cuánta energía se consume por segundo." },
                    { q: "Símbolo de tierra:", o: ["⊥","⏚","∩"], a: "⏚", correctText: "Correcto, este símbolo indica conexión a tierra.", wrongText: "No, el símbolo de tierra es ⏚." },
                    { q: "¿Qué es un fusible?", o: ["Protección sobrecorriente","Almacén energía","Fuente de luz"], a: "Protección sobrecorriente", correctText: "Exacto, un fusible protege el circuito ante sobrecorriente.", wrongText: "Incorrecto, el fusible sirve para proteger el circuito ante sobrecorriente." },
                    { q: "¿Qué indica un multímetro en modo V?", o: ["Voltaje","Corriente","Resistencia"], a: "Voltaje", correctText: "Correcto, mide el voltaje entre dos puntos.", wrongText: "No, V en el multímetro indica voltaje." },
                    { q: "Función de un potenciómetro:", o: ["Resistencia variable","Fuente de luz","Amplificador"], a: "Resistencia variable", correctText: "Bien, un potenciómetro ajusta resistencia manualmente.", wrongText: "Error, un potenciómetro es una resistencia ajustable." },

                    { q: "¿Qué mide un ohmímetro?", o: ["Resistencia","Voltaje","Corriente"], a: "Resistencia", correctText: "Bien, mide la resistencia de un componente.", wrongText: "Error, un ohmímetro mide resistencia." },

                    { q: "¿Qué es un circuito RC?", o: ["Resistencia y Capacitor","Resistencia y Condensador","Solo resistencias"], a: "Resistencia y Capacitor", correctText: "Exacto, un circuito RC combina resistencia y capacitor.", wrongText: "No, un circuito RC combina resistor y capacitor." },
                    { q: "¿Qué hace un relé?", o: ["Conmutar cargas","Emitir luz","Amplifica"], a: "Conmutar cargas", correctText: "Bien, un relé permite controlar un circuito con otro de baja potencia.", wrongText: "Error, un relé conmutará un circuito usando otro de control." },

                    { q: "¿Qué es un SCR?", o: ["Diodo controlado por silicio","Resistencia especial","Capacitor avanzado"], a: "Diodo controlado por silicio", correctText: "Correcto, un SCR permite controlar grandes corrientes con un pulso de gate.", wrongText: "Incorrecto, un SCR es un diodo controlado por silicio." },

                    { q: "¿Qué significa Ib en un BJT?", o: ["Corriente de base","Voltaje de colector","Resistencia"], a: "Corriente de base", correctText: "Correcto, Ib controla el flujo de Ic.", wrongText: "Incorrecto, Ib es la corriente que controla el BJT." },
                    { q: "¿Qué es un diodo puente?", o: ["Rectificador de 4 diodos","Diodo especial","Capacitor grande"], a: "Rectificador de 4 diodos", correctText: "Bien, convierte AC en DC usando 4 diodos.", wrongText: "No, un puente de diodos usa 4 diodos para rectificar." },
                    { q: "¿Qué es un optoacoplador?", o: ["Aisla eléctricamente con luz","Amplificador","Resistor especial"], a: "Aisla eléctricamente con luz", correctText: "Correcto, transmite señal usando luz sin conexión eléctrica directa.", wrongText: "Incorrecto, un optoacoplador aísla usando luz." },
                    { q: "¿Qué es el tiempo de retardo de un SCR?", o: ["Tiempo para activarse","Tiempo de apagado","Tiempo de conducción máxima"], a: "Tiempo para activarse", correctText: "Bien, indica cuánto tarda en comenzar a conducir tras el gate.", wrongText: "No, el retardo indica el tiempo hasta que el SCR conduce." },
                    { q: "¿Qué es el tiempo de recuperación inversa de un diodo?", o: ["Tiempo que tarda en dejar de conducir en reversa","Tiempo de conducción","Voltaje máximo"], a: "Tiempo que tarda en dejar de conducir en reversa", correctText: "Correcto, indica la rapidez con que un diodo cambia de estado.", wrongText: "Incorrecto, este tiempo es el que tarda el diodo en bloquear corriente inversa." },
                    { q: "¿Qué es el gate en un MOSFET?", o: ["Terminal que controla la corriente","Terminal de salida","Terminal de entrada de voltaje AC"], a: "Terminal que controla la corriente", correctText: "Correcto, el gate controla el flujo de corriente entre drain y source.", wrongText: "Incorrecto, el gate es la terminal de control del MOSFET." }
                ]
            }
        ];

        // --- STATE ---
        let state = {
            xp: 0,
            lives: 5,
            completed: [],
            currentLevel: null,
            currentQIdx: 0,
            selectedOption: null,
            save() {
                localStorage.setItem('electroMasterV3', JSON.stringify({
                    xp: this.xp,
                    completed: this.completed
                }));
            },
            load() {
                const data = JSON.parse(localStorage.getItem('electroMasterV3'));
                if (data) {
                    this.xp = data.xp;
                    this.completed = data.completed;
                }
            }
        };

        // --- UI & RENDER ---
        const ui = {
            renderMap() {
                const map = document.getElementById('view-map');
                map.innerHTML = '';
                
                LEVELS.forEach((level, index) => {
                    const isCompleted = state.completed.includes(level.id);
                    const isLocked = index > 0 && !state.completed.includes(LEVELS[index-1].id);
                    const isActive = !isCompleted && !isLocked;

                    const node = document.createElement('div');
                    node.className = `node ${isCompleted ? 'node-completed' : isLocked ? 'node-locked' : 'node-active'} mb-12`;
                    node.style.marginLeft = `${Math.sin(index) * 60}px`; // S-Shape curve
                    node.innerHTML = `<i class="fas ${level.icon}"></i>`;
                    
                    if (!isLocked) {
                        node.onclick = () => quizEngine.start(level);
                    }

                    // Label
                    const label = document.createElement('div');
                    label.className = "absolute -bottom-8 left-1/2 -translate-x-1/2 text-xs font-black uppercase whitespace-nowrap text-slate-500 tracking-tighter";
                    label.innerText = level.title;
                    node.appendChild(label);

                    map.appendChild(node);
                });

                this.updateStats();
            },

            updateStats() {
                document.getElementById('stat-xp').innerText = state.xp;
                document.getElementById('stat-lives').innerText = state.lives;
                const progress = (state.completed.length / LEVELS.length) * 100;
                document.getElementById('master-progress').style.width = `${progress}%`;
            },

            exitQuiz() {
                document.getElementById('view-quiz').classList.add('hidden');
                document.getElementById('view-map').classList.remove('hidden');
                this.renderMap();
            },

            showCert() {
                document.getElementById('cert-modal').classList.remove('hidden');
            },

            closeCert() {
                document.getElementById('cert-modal').classList.add('hidden');
            }
        };

        // --- QUIZ ENGINE ---
        const quizEngine = {
            start(level) {
                state.currentLevel = level;
                state.currentQIdx = 0;
                state.lives = 5;
                document.getElementById('view-map').classList.add('hidden');
                document.getElementById('view-quiz').classList.remove('hidden');
                this.renderQuestion();
            },

            renderQuestion() {
                const q = state.currentLevel.questions[state.currentQIdx];
                const progress = (state.currentQIdx / state.currentLevel.questions.length) * 100;
                document.getElementById('quiz-progress').style.width = `${progress}%`;
                
                const content = document.getElementById('quiz-content');
                content.innerHTML = `
                    <div class="mt-8">
                        <h2 class="text-2xl font-black leading-tight mb-8">${q.q}</h2>
                        <div class="grid gap-4">
                            ${q.o.map((opt, i) => `
                                <button onclick="quizEngine.selectOption(${i}, '${opt}')" class="option-btn p-5 rounded-2xl text-left font-bold text-lg">
                                    <span class="inline-block w-8 h-8 rounded-lg bg-slate-800 text-center leading-8 mr-3 text-sm">${i+1}</span>
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                document.getElementById('check-btn').classList.remove('hidden');
                document.getElementById('feedback-panel').classList.remove('show');
                state.selectedOption = null;
            },

            selectOption(idx, text) {
                state.selectedOption = text;
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach((b, i) => {
                    b.classList.toggle('selected', i === idx);
                });
            },

            checkAnswer() {
                if (!state.selectedOption) return;

                const q = state.currentLevel.questions[state.currentQIdx];
                const isCorrect = state.selectedOption === q.a;
                const panel = document.getElementById('feedback-panel');
                const title = document.getElementById('feedback-title');
                const text = document.getElementById('feedback-text');
                const icon = document.getElementById('feedback-icon');
                const btn = panel.querySelector('button');

                panel.className = `feedback-panel show ${isCorrect ? 'bg-green-600' : 'bg-red-600'}`;
                title.innerText = isCorrect ? '¡Excelente!' : 'Sigue intentando';
                text.innerText = isCorrect ? q.correctText : q.wrongText;
                icon.innerHTML = `<i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'}"></i>`;
                btn.className = `w-full py-4 rounded-2xl font-black uppercase tracking-widest text-white shadow-lg transition-all active:scale-95 ${isCorrect ? 'bg-green-500' : 'bg-red-500'}`;

                if (!isCorrect) {
                    state.lives--;
                    document.getElementById('heart-icon').classList.add('heart-pop');
                    setTimeout(() => document.getElementById('heart-icon').classList.remove('heart-pop'), 300);
                    if (state.lives <= 0) {
                        btn.innerText = "Reintentar Nivel";
                        btn.onclick = () => location.reload();
                    }
                } else {
                    state.xp += 10;
                }
                
                ui.updateStats();
            },

            nextQuestion() {
                if (state.currentQIdx < state.currentLevel.questions.length - 1) {
                    state.currentQIdx++;
                    this.renderQuestion();
                } else {
                    this.finishLevel();
                }
            },

            finishLevel() {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                if (!state.completed.includes(state.currentLevel.id)) {
                    state.completed.push(state.currentLevel.id);
                    state.xp += state.currentLevel.xp;
                }
                state.save();
                
                // Si es el nivel final o fase 2 (mod 5 o 6), mostrar certificado
                if (state.currentLevel.id === 'mod6') {
                    ui.showCert();
                } else {
                    ui.exitQuiz();
                }
            }
        };

        // --- CERTIFICATE ---
        const certificateLogic = {
            download() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                const title = state.currentLevel.title;
                const date = new Date().toLocaleDateString();

                // Background
                doc.setFillColor(15, 23, 42);
                doc.rect(0, 0, 297, 210, 'F');
                doc.setDrawColor(59, 130, 246);
                doc.setLineWidth(2);
                doc.rect(10, 10, 277, 190);

                // Content
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(40);
                doc.text("CERTIFICADO DE LOGRO", 148, 60, null, null, "center");
                
                doc.setFontSize(20);
                doc.setTextColor(150, 150, 150);
                doc.text("OTORGADO A EL INGENIERO(A):", 148, 90, null, null, "center");
                
                doc.setFontSize(35);
                doc.setTextColor(59, 130, 246);
                doc.text("ESTUDIANTE PRO", 148, 115, null, null, "center");
                
                doc.setFontSize(18);
                doc.setTextColor(200, 200, 200);
                doc.text(`Por completar exitosamente el módulo:`, 148, 140, null, null, "center");
                doc.text(title.toUpperCase(), 148, 155, null, null, "center");

                doc.setFontSize(12);
                doc.text(`Fecha: ${date}`, 40, 185);
                doc.text("ID: ELECTROM-PRO-" + Math.random().toString(36).substr(2, 9).toUpperCase(), 200, 185);

                doc.save('Certificado_ElectroMaster.pdf');
                ui.closeCert();
                ui.exitQuiz();
            }
        };

        window.onload = () => {
            state.load();
            ui.renderMap();
        };
    </script>
</body>
</html>
