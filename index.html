<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboClass - Maestro de la Robótica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #f7f9fb; 
            user-select: none; 
            overflow-x: hidden;
        }
        
        .btn-push { transition: all 0.1s; border-bottom: 4px solid; }
        .btn-push:active { transform: translateY(4px); border-bottom-width: 0px; margin-bottom: 4px; }

        .hidden { display: none; }
        
        #path-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .lesson-node {
            z-index: 10;
            position: relative;
        }

        .node-completed { background: #58cc02; border-color: #46a302; color: white; }
        .node-current { background: #1cb0f6; border-color: #1899d6; color: white; animation: pulse 2s infinite; }
        .node-locked { background: #e5e5e5; border-color: #afafaf; color: #afafaf; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(28, 176, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(28, 176, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(28, 176, 246, 0); }
        }

        .scroll-container::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header / Stats -->
    <nav class="fixed top-0 left-0 w-full bg-white border-b-2 border-gray-200 z-50 h-16 flex items-center justify-between px-4">
        <div class="flex items-center gap-4">
            <div class="text-2xl font-black text-blue-500">ROBOCLASS</div>
            <div class="hidden md:flex bg-gray-200 h-4 w-48 rounded-full overflow-hidden">
                <div id="master-progress" class="bg-blue-500 h-full" style="width: 0%"></div>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 font-bold text-orange-500">
                <i class="fas fa-bolt text-xl"></i>
                <span id="stat-xp">0</span>
            </div>
            <div class="flex items-center gap-2 font-bold text-red-500">
                <i class="fas fa-heart text-xl"></i>
                <span id="stat-lives">5</span>
            </div>
            <div class="flex items-center gap-2 font-bold text-blue-500">
                <i class="fas fa-trophy text-xl"></i>
                <span id="stat-phase">FASE 1</span>
            </div>
        </div>
    </nav>

    <!-- Main Map View -->
    <main id="app-container" class="relative pt-20 pb-32 flex flex-col items-center">
        <canvas id="path-canvas"></canvas>
        <div id="map-content" class="w-full max-w-lg flex flex-col items-center gap-16 relative">
            <!-- Nodos se generan dinámicamente -->
        </div>
    </main>

    <!-- Lesson Overlay / Modal -->
    <div id="lesson-overlay" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <div class="h-16 border-b-2 flex items-center justify-between px-4">
            <button onclick="closeLesson()" class="text-gray-400 hover:text-gray-600 text-2xl p-2">
                <i class="fas fa-times"></i>
            </button>
            <div class="flex-1 mx-8 bg-gray-200 h-4 rounded-full overflow-hidden">
                <div id="lesson-progress" class="bg-green-500 h-full w-0 transition-all"></div>
            </div>
            <div class="flex items-center gap-2 font-bold text-red-500">
                <i class="fas fa-heart"></i>
                <span id="lesson-lives">5</span>
            </div>
        </div>
        
        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center max-w-xl mx-auto w-full">
            <h2 id="lesson-title" class="text-3xl font-black mb-4">Título Actividad</h2>
            <p id="lesson-desc" class="text-gray-600 mb-8">Cargando desafío...</p>
            
            <div id="quiz-container" class="w-full grid gap-4">
                <!-- Opciones de respuesta -->
            </div>
        </div>

        <div class="p-6 border-t-2 bg-gray-50 flex justify-end">
            <button id="check-btn" onclick="checkAnswer()" class="btn-push px-12 py-3 bg-green-500 text-white rounded-xl font-black text-lg border-green-700 shadow-lg">
                COMPROBAR
            </button>
        </div>
    </div>

    <!-- Scripts de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración Global proporcionada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'robotica-default';
        
        // Inicialización de Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CURRICULUM DEFINITION
        const CURRICULUM = [
            { name: "Fase 1: Electrónica Básica", icon: "bolt", lessons: [
                "Flujo de electrones", "Ley de Ohm", "Uso del Multímetro", "Circuitos Serie", "Circuitos Paralelo", 
                "Resistencias y Colores", "Condensadores", "Diodos", "Transistores", "Uso de Protoboard", 
                "Caída de Tensión", "AC vs DC", "Seguridad Eléctrica", "Soldadura", "Esquemáticos", "Certificación Nivel 1"
            ]},
            { name: "Fase 2: Arquitectura Arduino", icon: "microchip", lessons: [
                "Ecosistema Arduino", "Anatomía del Uno", "Configuración IDE", "Setup y Loop", "GPIO Digital", 
                "Señales Analógicas", "PWM", "Monitor Serial", "Librerías", "Interrupciones", "Gestión de Memoria", 
                "Temporización Millis", "Periféricos", "Debugging", "Luces Rítmicas", "Desafío Binario"
            ]},
            { name: "Fase 3: Programación C++", icon: "code", lessons: [
                "Sintaxis C++ Embebidos", "Operadores Lógicos", "Estructuras If/Else", "Bucles For/While", "Funciones", 
                "Ámbito de Variables", "Arrays", "Punteros", "Structs", "Objetos Básicos", "Strings", 
                "Macros", "Optimización", "Librerías Propias", "Refactorización", "Algoritmo de Decisión"
            ]},
            { name: "Fase 4: Sensores y Percepción", icon: "eye", lessons: [
                "Tipos de Sensores", "Ultrasonido HC-SR04", "Infrarrojos", "DHT11 Temp/Hum", "IMU (Giroscopio)", 
                "Sensores LDR", "Sensores de Gas", "Sensores de Sonido", "Teclados Matriciales", "RFID", 
                "Filtrado de Ruido", "Protocolo I2C", "Protocolo SPI", "Pantallas LCD/OLED", "Sistemas de Alarma", "Certificación Percepción"
            ]},
            { name: "Fase 5: Actuadores", icon: "gear", lessons: [
                "Motores DC", "Puente H L298N", "Servomotores", "Motores Paso a Paso", "Relés de Potencia", 
                "Solenoides", "Zumbadores", "Control PWM", "Reductoras y Torque", "Consumo de Corriente", 
                "Fuentes Autónomas", "Diodos Flyback", "Sincronización", "Garra Robótica", "Precisión con Servos", "Brazo 2DOF"
            ]},
            { name: "Fase 6: Diseño Mecánico CAD", icon: "compass-drafting", lessons: [
                "Mecánica Clásica", "Introducción al CAD", "Tinkercad/Fusion 360", "Bocetos 2D", "Extrusión 3D", 
                "Ensamblajes", "Chasis de Robots", "Tolerancias", "Engranajes", "Centros de Masa", 
                "Resistencia de Materiales", "Archivos STL", "Renderizado", "Simulación", "Carcasas", "Certificación CAD"
            ]},
            { name: "Fase 7: Fabricación 3D", icon: "print", lessons: [
                "FDM vs SLA", "Calibración Impresora", "Filamentos (PLA/ABS)", "Laminado (Slicer)", "Soportes", 
                "Troubleshooting", "Post-procesado", "Corte Láser", "Mecanizado CNC", "Montaje Electrónico", 
                "Prototipado Rápido", "Resistencia Piezas", "Herramientas Taller", "Mantenimiento", "Robot Personalizado", "Certificación Fabricación"
            ]},
            { name: "Fase 8: Robótica Móvil", icon: "car", lessons: [
                "Tipos de Locomoción", "Cinemática Diferencial", "Tracción", "Seguidor de Línea PID", "Resolución de Laberintos", 
                "Evitación de Obstáculos", "Odometría", "Encoders", "Navegación Balizas", "Control Remoto IR", 
                "Mapeo Básico", "Baterías Li-Po", "Cargadores Balanceados", "Algoritmos Exploración", "Competencia Móvil", "Certificación Navegación"
            ]},
            { name: "Fase 9: IoT e Inalámbrico", icon: "wifi", lessons: [
                "Comunicación Wireless", "Bluetooth HC-05", "Wi-Fi ESP32", "MQTT / HTTP", "Servidor Web", 
                "App Móvil Control", "Dashboards IoT", "LoRa", "Radiofrecuencia NRF", "Ciberseguridad", 
                "Actualizaciones OTA", "Cloud Data", "JSON", "Asistentes Voz", "Estación Meteorológica", "Certificación IoT"
            ]},
            { name: "Fase 10: ROS (Operating System)", icon: "terminal", lessons: [
                "Qué es ROS", "Ubuntu Instalación", "Nodos y Mensajes", "Topics (Pub/Sub)", "Servicios/Acciones", 
                "Simulador Gazebo", "Rviz Visualización", "Creación Paquetes", "TF Transformadas", "Rosserial Arduino", 
                "Teleoperación", "ROS Bags", "Trayectorias", "Diagnóstico", "Simulación Móvil", "Certificación ROS"
            ]},
            { name: "Fase 11: Python para Robots", icon: "brands fa-python", lessons: ["Sintaxis Python", "Listas/Diccs", "Bucles", "Módulos", "POO", "Excepciones", "NumPy/Matplotlib", "PySerial", "GUIs", "Automatización", "Venv", "JSON Processing", "Threading", "Raspberry Pi", "Remote Scripts", "Control Console"]},
            { name: "Fase 12: Visión Artificial", icon: "camera", lessons: ["Fundamentos Imagen", "OpenCV", "Video Realtime", "Espacios Color", "Filtros", "Bordes", "Threshold", "Tracking Color", "Formas", "QR/Barcode", "Calibración", "Movimiento", "Features", "RA Simple", "Sorting Arm", "Certificación Visión"]},
            { name: "Fase 13: IA y ML", icon: "brain", lessons: ["Conceptos IA", "Tipos Learning", "Regresión", "Árboles Decisión", "Redes Neuronales", "Scikit-learn", "AI Sensorial", "CNNs", "Image Classifier", "Edge AI", "Pre-trained Models", "Etiquetado", "Gestos", "Optimización", "RL Obstáculos", "Certificación IA"]},
            { name: "Fase 14: Robótica Industrial", icon: "industry", lessons: ["Panorama Industrial", "Seguridad", "Brazos (Conceptos)", "Cinemática Inv", "PLC Control", "EOAT (Grippers)", "Cobots", "Safety Limits", "Montaje Líneas", "Visión Industrial", "Offline Prog", "Mantenimiento", "Workflows", "Modbus", "Celda Manufactura", "Certificación Industrial"]},
            { name: "Fase 15: Control Automático", icon: "diagram-project", lessons: ["Lazo Abierto/Cerrado", "Modelado", "Func. Transferencia", "Estabilidad", "Intro PID", "Término P", "Término I", "Término D", "Ziegler-Nichols", "Coding PID", "Precisión Posición", "Speed Control", "Filtering", "Linealidad", "Péndulo Invertido", "Certificación Control"]},
            { name: "Fase 16: Potencia y Energía", icon: "battery-full", lessons: ["Alta Demanda", "Buck/Boost", "MOSFET/IGBT", "Calor", "Fusibles", "SMPS Design", "Solar Robots", "BMS Systems", "Frenado Regen", "Optoacopladores", "EMI Shielding", "Eficiencia", "PCB Power", "Smart Charger", "Sleep Modes", "Certificación Energía"]},
            { name: "Fase 17: Humanoides y Social", icon: "robot", lessons: ["Robótica Social", "HRI", "NLP Básico", "TTS Voz", "Emociones", "Bípedos", "Dynamixel", "Leyes Asimov", "Estética", "Piel Táctil", "Entornos Dinámicos", "Telepresencia", "Asistencial", "Social Behavior", "Robot Asistente", "Certificación Social"]},
            { name: "Fase 18: Drones (UAV)", icon: "plane", lessons: ["Física Vuelo", "Anatomía Multi", "FC Betaflight", "Brushless Motors", "Barómetros/GPS", "Radio Control", "Modos Vuelo", "Telemetría", "FPV Video", "Waypoints", "Normativa", "Avoidance", "Failsafe", "Build Drone", "Flight Practice", "Certificación Drones"]},
            { name: "Fase 19: Proyecto Grado", icon: "graduation-cap", lessons: ["Agile/Scrum", "Problema/Solución", "Investigación", "Presupuesto", "Cronograma", "Diseño Final", "MVP Build", "Hardware Tests", "Software Tests", "Integración", "Manuales", "Video Demo", "Pitch Prep", "Peer Review", "Final Polish", "Defensa"]},
            { name: "Fase 20: Certificación Maestro", icon: "medal", lessons: ["Revisión Gen", "GitHub Portafolio", "Resumen CV", "Entrevistas", "Examen Teórico", "Hackathon 24h", "Doc Final", "Personal Brand", "Startup/Business", "Patentes", "Ética Prof", "Job Hunt", "Presentación", "Resultados", "Insignias", "GRADUACIÓN"]}
        ];

        const QUESTION_BANK = {
            "Ley de Ohm": { q: "¿Qué fórmula define la Ley de Ohm?", o: ["V = I / R", "V = I * R", "I = V * R", "R = V * I"], a: 1 },
            "Arduino Uno": { q: "¿Cuántos pines digitales tiene un Arduino Uno?", o: ["10", "12", "14", "20"], a: 2 },
            "Servomotores": { q: "¿Qué señal controla la posición de un Servo?", o: ["AM", "PWM", "FM", "I2C"], a: 1 }
        };

        // Estado Local
        let state = {
            xp: 0,
            lives: 5,
            completed: [],
            user: null
        };

        let activeLesson = null;

        // Inicializar Autenticación y luego la App
        async function initAuthAndApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        state.user = user;
                        setupFirestoreSync();
                        renderMap();
                        updateUI();
                    }
                });
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        // Sincronización con Firestore
        function setupFirestoreSync() {
            if (!state.user) return;
            
            const userDoc = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'progress');
            
            // Listener en tiempo real
            onSnapshot(userDoc, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.xp = data.xp || 0;
                    state.lives = data.lives || 5;
                    state.completed = data.completed || [];
                    renderMap();
                    updateUI();
                } else {
                    // Crear documento inicial si no existe
                    saveState();
                }
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        async function saveState() {
            if (!state.user) return;
            const userDoc = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'progress');
            try {
                await setDoc(userDoc, {
                    xp: state.xp,
                    lives: state.lives,
                    completed: state.completed,
                    lastUpdated: Date.now()
                });
            } catch (e) {
                console.error("Save error:", e);
            }
        }

        // --- UI RENDER LOGIC ---

        function renderMap() {
            const map = document.getElementById('map-content');
            if (!map) return;
            map.innerHTML = "";
            let lessonCounter = 0;

            CURRICULUM.forEach((phase, pIdx) => {
                const phaseHeader = document.createElement('div');
                phaseHeader.className = "w-full text-center py-8";
                phaseHeader.innerHTML = `
                    <div class="inline-block bg-white p-4 rounded-3xl border-2 border-gray-200 shadow-sm mb-4">
                        <i class="fas fa-${phase.icon} text-4xl text-blue-500"></i>
                    </div>
                    <h3 class="text-xl font-black text-gray-400 uppercase tracking-widest">${phase.name}</h3>
                `;
                map.appendChild(phaseHeader);

                phase.lessons.forEach((lesson, lIdx) => {
                    const lessonId = `L${pIdx}-${lIdx}`;
                    const isCompleted = state.completed.includes(lessonId);
                    const isCurrent = state.completed.length === lessonCounter;
                    const isLocked = state.completed.length < lessonCounter;

                    const btn = document.createElement('button');
                    btn.className = `lesson-node w-16 h-16 rounded-full border-b-4 flex items-center justify-center text-xl shadow-lg transition-transform hover:scale-110 active:scale-95 mb-8
                        ${isCompleted ? 'node-completed' : (isCurrent ? 'node-current' : 'node-locked')}`;
                    btn.innerHTML = isCompleted ? '<i class="fas fa-check"></i>' : (lessonCounter + 1);
                    
                    const offset = (lIdx % 3 === 0) ? '0px' : (lIdx % 3 === 1 ? '40px' : '-40px');
                    btn.style.left = offset;

                    if(!isLocked) {
                        btn.onclick = () => openLesson(lessonId, lesson);
                    }

                    map.appendChild(btn);
                    lessonCounter++;
                });
            });
            
            setTimeout(drawPath, 150);
        }

        function drawPath() {
            const canvas = document.getElementById('path-canvas');
            const map = document.getElementById('map-content');
            if (!canvas || !map) return;

            canvas.width = window.innerWidth;
            canvas.height = map.offsetHeight + 200;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const nodes = document.querySelectorAll('.lesson-node');
            if (nodes.length < 2) return;

            ctx.beginPath();
            ctx.strokeStyle = "#e5e5e5";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            nodes.forEach((node, i) => {
                const rect = node.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2 + window.scrollY;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        // --- LESSON LOGIC ---

        window.openLesson = (id, title) => {
            if (state.lives <= 0) {
                const msg = document.createElement('div');
                msg.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-xl z-[200]";
                msg.innerText = "¡Sin vidas! Espera a que se recarguen.";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
                return;
            }

            activeLesson = { id, title };
            document.getElementById('lesson-overlay').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = title;
            document.getElementById('lesson-progress').style.width = "0%";
            
            const questionData = QUESTION_BANK[title] || {
                q: `¿Cuál es el objetivo principal de ${title}?`,
                o: ["Aprender técnica", "Dominar la industria", "Resolver problemas", "Aprobar examen"],
                a: Math.floor(Math.random() * 4)
            };

            activeLesson.answer = questionData.a;
            const quiz = document.getElementById('quiz-container');
            quiz.innerHTML = "";
            questionData.o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 border-2 border-gray-200 rounded-2xl text-left font-bold hover:bg-blue-50 hover:border-blue-300 transition-all";
                b.innerText = opt;
                b.onclick = () => selectOption(i, b);
                quiz.appendChild(b);
            });
        };

        function selectOption(idx, el) {
            document.querySelectorAll('#quiz-container button').forEach(b => {
                b.classList.remove('border-blue-500', 'bg-blue-100');
            });
            el.classList.add('border-blue-500', 'bg-blue-100');
            activeLesson.selected = idx;
        }

        window.checkAnswer = async () => {
            if (activeLesson.selected === undefined) return;

            const isCorrect = activeLesson.selected === activeLesson.answer;
            const btn = document.getElementById('check-btn');

            if (isCorrect) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                if (!state.completed.includes(activeLesson.id)) {
                    state.completed.push(activeLesson.id);
                    state.xp += 15;
                }
                document.getElementById('lesson-progress').style.width = "100%";
                await saveState();
                setTimeout(() => {
                    closeLesson();
                }, 1000);
            } else {
                state.lives--;
                btn.classList.add('bg-red-500', 'border-red-700');
                btn.innerText = "¡INCORRECTO!";
                await saveState();
                setTimeout(() => {
                    btn.classList.remove('bg-red-500', 'border-red-700');
                    btn.classList.add('bg-green-500', 'border-green-700');
                    btn.innerText = "COMPROBAR";
                    if(state.lives <= 0) closeLesson();
                    updateUI();
                }, 1000);
            }
        };

        window.closeLesson = () => {
            document.getElementById('lesson-overlay').classList.add('hidden');
            activeLesson = null;
        };

        function updateUI() {
            document.getElementById('stat-xp').innerText = state.xp;
            document.getElementById('stat-lives').innerText = state.lives;
            document.getElementById('lesson-lives').innerText = state.lives;

            const totalLessons = CURRICULUM.reduce((acc, phase) => acc + phase.lessons.length, 0);
            const progress = (state.completed.length / totalLessons) * 100;
            document.getElementById('master-progress').style.width = `${progress}%`;

            let currentPhase = "Fase 1";
            let accumulated = 0;
            for(let phase of CURRICULUM) {
                accumulated += phase.lessons.length;
                if(state.completed.length < accumulated) {
                    currentPhase = phase.name.split(':')[0];
                    break;
                }
            }
            document.getElementById('stat-phase').innerText = currentPhase.toUpperCase();
        }

        // Ejecutar inicio
        initAuthAndApp();
        window.addEventListener('resize', drawPath);
    </script>
</body>
</html>
