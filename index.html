<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster University - PRO</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=JetBrains+Mono&display=swap');
        
        :root { --primary: #3b82f6; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-push { transition: all 0.1s; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .btn-push:active { transform: translateY(2px); border-bottom-width: 0; margin-bottom: 4px; }
        
        .progress-fill { transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
        
        @keyframes pulse-blue { 0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 50% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } }
        .node-current { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body class="min-h-screen">

    <div id="app-shell" class="hidden">
        <!-- Navegación Superior -->
        <nav class="sticky top-0 z-50 glass px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black shadow-lg shadow-blue-500/20">E</div>
                <div class="hidden md:block">
                    <h1 class="text-sm font-black tracking-tighter italic">ELECTROMASTER <span class="text-blue-500 text-xs">PRO</span></h1>
                </div>
            </div>
            
            <div class="flex-grow max-w-xs mx-4 h-2.5 bg-slate-800 rounded-full overflow-hidden">
                <div id="global-progress" class="h-full bg-blue-500 progress-fill" style="width: 0%"></div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1.5 text-orange-500 font-bold text-sm">
                    <i class="fas fa-fire"></i> <span id="stat-streak">0</span>
                </div>
                <button onclick="authActions.logout()" class="text-slate-400 hover:text-white p-2">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </nav>

        <main id="main-view" class="p-4 max-w-4xl mx-auto pb-24"></main>
    </div>

    <!-- Pantalla de Carga/Login -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 bg-slate-950">
        <div class="w-full max-w-md glass p-8 rounded-[2.5rem] text-center space-y-8">
            <div>
                <i class="fas fa-microchip text-5xl text-blue-500 mb-4"></i>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Acceso Institucional</h2>
            </div>
            
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email Universidad" class="w-full bg-slate-900 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500 text-white">
                <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-slate-900 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500 text-white">
                <button onclick="authActions.login()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black uppercase rounded-2xl btn-push shadow-lg">Entrar al Sistema</button>
                <button onclick="authActions.register()" class="w-full py-2 text-slate-500 text-xs hover:text-white">¿No tienes cuenta? Regístrate aquí</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // TUS CREDENCIALES INTEGRADAS
        const firebaseConfig = {
            apiKey: "AIzaSyBUF4X4OvGKdaUOdxtD0Eyj4F1GY-__NOQ",
            authDomain: "electromaster-f2a7a.firebaseapp.com",
            projectId: "electromaster-f2a7a",
            storageBucket: "electromaster-f2a7a.firebasestorage.app",
            messagingSenderId: "757265026642",
            appId: "1:757265026642:web:dddb40ce77e296358c198b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "electromaster-f2a7a";

        // --- ESTADO ---
        let userData = null;
        const CURRICULUM = [
            { id: 'f1', title: 'Fase 1: Circuitos DC', xp: 500, lessons: [
                { q: "¿Unidad de Resistencia?", o: ["Ohmio", "Voltio", "Amperio"], a: "T2htaW8=" },
                { q: "¿V = I * R es?", o: ["Ley Ohm", "Ley Watt", "Ley Tesla"], a: "TGV5IE9obQ==" }
            ]},
            { id: 'f2', title: 'Fase 2: Semiconductores', xp: 1000, lessons: [
                { q: "¿Componente que rectifica?", o: ["Diodo", "Capacitor", "Inductor"], a: "RGlvZG8=" },
                { q: "¿Transistor que usa voltaje?", o: ["MOSFET", "BJT", "Zenner"], a: "TU9TRkVU" }
            ]}
        ];

        // --- ACCIONES AUTH ---
        window.authActions = {
            async login() {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error: " + err.message); }
            },
            async register() {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error al registrar: " + err.message); }
            },
            logout() { signOut(auth); }
        };

        // --- LÓGICA CORE ---
        onAuthStateChanged(auth, async (user) => {
            const authScreen = document.getElementById('auth-screen');
            const shell = document.getElementById('app-shell');
            
            if (user) {
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const docSnap = await getDoc(userRef);
                
                if (!docSnap.exists()) {
                    userData = { name: user.email.split('@')[0], xp: 0, streak: 1, completed: [], role: 'student' };
                    await setDoc(userRef, userData);
                } else {
                    userData = docSnap.data();
                }
                
                authScreen.classList.add('hidden');
                shell.classList.remove('hidden');
                renderDashboard();
                updateStats();
            } else {
                authScreen.classList.remove('hidden');
                shell.classList.add('hidden');
            }
        });

        function updateStats() {
            document.getElementById('stat-streak').innerText = userData.streak;
            const progress = (userData.completed.length / CURRICULUM.length) * 100;
            document.getElementById('global-progress').style.width = `${progress}%`;
        }

        function renderDashboard() {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <header>
                        <h2 class="text-xs font-black text-blue-500 uppercase tracking-widest mb-1">Panel del Estudiante</h2>
                        <p class="text-3xl font-black italic uppercase">Hola, ${userData.name}</p>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${CURRICULUM.map(phase => {
                            const isDone = userData.completed.includes(phase.id);
                            return `
                                <div class="glass p-6 rounded-[2rem] border-white/5 relative group overflow-hidden">
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="w-12 h-12 rounded-2xl ${isDone ? 'bg-green-500/20 text-green-500' : 'bg-blue-600/20 text-blue-500'} flex items-center justify-center text-xl">
                                            <i class="fas ${isDone ? 'fa-certificate' : 'fa-bolt'}"></i>
                                        </div>
                                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">ID: ${phase.id}</span>
                                    </div>
                                    <h3 class="text-xl font-bold mb-1">${phase.title}</h3>
                                    <p class="text-xs text-slate-400 mb-6">${phase.lessons.length} Módulos de Evaluación</p>
                                    
                                    <div class="flex items-center gap-3">
                                        <button onclick="window.startLesson('${phase.id}')" class="flex-grow py-3 ${isDone ? 'bg-slate-800 text-slate-500' : 'bg-blue-600 text-white'} rounded-xl font-black uppercase text-xs btn-push">
                                            ${isDone ? 'Repasar Fase' : 'Iniciar Fase'}
                                        </button>
                                        ${isDone ? `<button onclick="window.certify('${phase.id}')" class="p-3 bg-orange-500 text-white rounded-xl btn-push"><i class="fas fa-file-pdf"></i></button>` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        window.startLesson = (id) => {
            const phase = CURRICULUM.find(p => p.id === id);
            const main = document.getElementById('main-view');
            let currentQ = 0;
            
            const renderQ = () => {
                const q = phase.lessons[currentQ];
                main.innerHTML = `
                    <div class="max-w-md mx-auto py-10 space-y-8 animate-in fade-in slide-in-from-right-4">
                        <div class="flex justify-between items-center text-xs font-bold text-slate-500 uppercase">
                            <span>Módulo ${currentQ + 1} de ${phase.lessons.length}</span>
                            <span>${phase.title}</span>
                        </div>
                        <h2 class="text-2xl font-black leading-tight">${q.q}</h2>
                        <div class="space-y-3">
                            ${q.o.map(opt => `
                                <button onclick="window.checkAns('${btoa(opt)}', '${q.a}', ${currentQ}, '${id}')" class="w-full p-5 glass rounded-2xl border-2 border-slate-700 text-left font-bold hover:border-blue-500 transition-all">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            };

            window.checkAns = async (val, correct, idx, pId) => {
                if (val === correct) {
                    confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
                    if (idx + 1 < phase.lessons.length) {
                        currentQ++;
                        renderQ();
                    } else {
                        // Fase Completada
                        if (!userData.completed.includes(pId)) {
                            userData.completed.push(pId);
                            userData.xp += phase.xp;
                            const userRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'profile', 'data');
                            await updateDoc(userRef, { completed: userData.completed, xp: userData.xp });
                        }
                        renderDashboard();
                        updateStats();
                    }
                } else {
                    alert("Incorrecto. Analiza el diagrama y vuelve a intentarlo.");
                }
            };

            renderQ();
        };

        window.certify = (id) => {
            const phase = CURRICULUM.find(p => p.id === id);
            const { jsPDF } = window.jspdf;
            const docCert = new jsPDF('l', 'mm', 'a4');
            const uid = auth.currentUser.uid.slice(0, 8).toUpperCase();

            docCert.setFillColor(15, 23, 42);
            docCert.rect(0, 0, 297, 210, 'F');
            docCert.setDrawColor(59, 130, 246);
            docCert.setLineWidth(1);
            docCert.rect(10, 10, 277, 190);

            docCert.setTextColor(255, 255, 255);
            docCert.setFontSize(40);
            docCert.text("CERTIFICADO DE LOGRO", 148, 60, null, null, "center");
            
            docCert.setFontSize(20);
            docCert.setTextColor(150, 150, 150);
            docCert.text("OTORGADO A EL INGENIERO(A):", 148, 90, null, null, "center");
            
            docCert.setFontSize(35);
            docCert.setTextColor(59, 130, 246);
            docCert.text(userData.name.toUpperCase(), 148, 115, null, null, "center");
            
            docCert.setFontSize(15);
            docCert.setTextColor(200, 200, 200);
            docCert.text(`POR COMPLETAR LA FASE TÉCNICA: ${phase.title.toUpperCase()}`, 148, 145, null, null, "center");

            docCert.setFontSize(10);
            docCert.text(`ID DE VERIFICACIÓN: EM-UNI-${uid}-${id.toUpperCase()}`, 148, 180, null, null, "center");

            docCert.save(`Certificado_${id}.pdf`);
        };

    </script>
</body>
</html>
