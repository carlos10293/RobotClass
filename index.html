<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboClass - Ingeniería Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; user-select: none; overflow-x: hidden; }
        .node-completed { background: #10b981; border-color: #059669; color: white; }
        .node-current { background: #3b82f6; border-color: #2563eb; color: white; animation: pulse 2s infinite; }
        .node-locked { background: #cbd5e1; border-color: #94a3b8; color: #64748b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #path-canvas { position: absolute; top: 0; left: 0; z-index: 0; pointer-events: none; opacity: 0.3; }
        .option-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .option-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="fixed top-0 left-0 w-full bg-slate-900 text-white z-50 h-16 flex items-center justify-between px-6 shadow-xl">
        <div class="flex items-center gap-4">
            <span class="text-xl font-black text-blue-400">ROBOCLASS <span class="text-white text-xs font-mono">PRO</span></span>
        </div>
        <div class="flex gap-4 font-mono text-sm">
            <div class="text-rose-400"><i class="fas fa-heart"></i> <span id="stat-lives">5</span></div>
            <div class="text-blue-400"><i class="fas fa-bolt"></i> <span id="stat-xp">0</span> XP</div>
        </div>
    </nav>

    <main id="app-container" class="relative pt-24 pb-40 flex flex-col items-center min-h-screen">
        <canvas id="path-canvas"></canvas>
        <div id="map-content" class="w-full max-w-2xl flex flex-col items-center gap-8 relative px-4">
            <!-- Cargando sistema... -->
        </div>
    </main>

    <!-- Overlay de Lección -->
    <div id="lesson-overlay" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <div class="h-16 border-b flex items-center justify-between px-6">
            <button onclick="closeLesson()" class="text-slate-500 font-bold">← VOLVER</button>
            <div class="h-2 flex-1 mx-4 bg-slate-100 rounded-full overflow-hidden">
                <div id="lesson-progress" class="h-full bg-blue-500 w-0 transition-all"></div>
            </div>
            <div class="font-bold text-rose-500"><i class="fas fa-heart"></i> <span id="modal-lives">5</span></div>
        </div>
        <div class="flex-1 p-6 md:p-12 overflow-y-auto flex flex-col items-center">
            <div class="max-w-2xl w-full">
                <h2 id="lesson-title" class="text-3xl font-black mb-6 text-slate-900"></h2>
                <div class="bg-slate-50 p-6 rounded-2xl mb-6 border border-slate-200">
                    <p id="lesson-q" class="text-lg font-medium text-slate-800"></p>
                </div>
                <div id="quiz-options" class="grid gap-3"></div>
                <div id="feedback-box" class="hidden mt-6 p-4 rounded-xl border-l-4">
                    <p id="feedback-text" class="text-sm font-semibold"></p>
                </div>
            </div>
        </div>
        <div class="p-6 border-t flex justify-center">
            <button id="check-btn" onclick="handleInteraction()" class="w-full max-w-md py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg">VERIFICAR RESPUESTA</button>
        </div>
    </div>

    <script type="module">
        // --- ESTRUCTURA TÉCNICA (20 FASES x 16 LECCIONES) ---
        const CURRICULUM = [
            { n: "Electrónica de Potencia", l: ["Flujo electrones", "Ley Ohm", "Multímetro", "Serie", "Paralelo", "Colores Resistencia", "Capacitores", "Diodos", "Transistores", "Protoboard", "Caída Tensión", "CA vs CC", "Seguridad", "Soldadura", "Esquemas", "CERTIFICACIÓN 1"] },
            { n: "Arquitectura Sistemas", l: ["Arduino", "ATmega328P", "IDE Setup", "Loops", "Variables", "DigitalWrite", "DigitalRead", "PWM", "AnalogRead", "Monitor Serial", "Lógica IF", "Ciclos FOR", "Funciones", "Librerías", "Interrupciones", "CERTIFICACIÓN 2"] },
            { n: "Programación C++", l: ["Sintaxis", "Operadores", "Data Types", "Punteros", "Arreglos", "Estructuras", "Clases", "Objetos", "Herencia", "Polimorfismo", "Memoria", "Debugging", "Compilación", "Bitwise", "Estándares", "CERTIFICACIÓN 3"] },
            { n: "Sensores y Señales", l: ["Infrarrojo", "Ultrasonido", "LDR", "DHT11", "IMU", "Giroscopio", "Presión", "Humedad", "Servos", "Motores DC", "Steppers", "Relés", "Solenoides", "Buzzer", "LCD", "CERTIFICACIÓN 4"] },
            { n: "Control de Motores", l: ["Puente H", "A4988", "PWM Control", "Back-EMF", "Encoders", "Feedback", "Torque", "Ratios", "Servos 360", "Brushless", "ESC", "Bipolar", "Corriente", "Inducción", "Latencia", "CERTIFICACIÓN 5"] },
            { n: "Diseño PCB", l: ["EDA", "Esquema", "Footprints", "Routing", "Ground Plane", "Vías", "DRC", "Librerías", "Gerbers", "SMD", "Stencil", "Assembly", "Continuidad", "Aislamiento", "ESD", "CERTIFICACIÓN 6"] },
            { n: "Mecánica CAD", l: ["Coordenadas", "Extrusión", "Revolución", "Ensambles", "Mates", "Tolerancia", "Materiales", "Masa", "Simulación", "STL", "Planos", "Engranajes", "Poleas", "Articulación", "Threads", "CERTIFICACIÓN 7"] },
            { n: "Impresión 3D", l: ["FDM", "Filamentos", "Slicing", "Capas", "Infill", "Supports", "Levelling", "Extrusión", "Adhesión", "Post-process", "Mechanicals", "Mantenimiento", "Errores", "SLA", "Design 3D", "CERTIFICACIÓN 8"] },
            { n: "IoT y WiFi", l: ["HTTP", "MQTT", "ESP32", "Config", "BLE", "Blynk", "REST", "Servers", "JSON", "Security", "Nodes", "Deep Sleep", "OTA", "Cloud", "IFTTT", "CERTIFICACIÓN 9"] },
            { n: "Control Lazo Cerrado", l: ["Open Loop", "Closed Loop", "Error", "Proporcional", "Integral", "Derivativo", "Tuning", "Ziegler", "Saturación", "Sampling", "Estabilidad", "Filtros", "Posición", "Velocidad", "Casos", "CERTIFICACIÓN 10"] },
            { n: "Cinemática Móvil", l: ["Diferencial", "Odometría", "Trayectoria", "Obstáculos", "Line Follow", "Mapeo", "Encoders", "LiPo", "BMS", "Chasis", "Dinámica", "Giro", "Tracción", "Suspensión", "ROS Mobile", "CERTIFICACIÓN 11"] },
            { n: "Brazos Robóticos", l: ["DoF", "Forward Kin.", "DH Params", "Inverse Kin.", "Jacobian", "End Effector", "Path Plan", "Precision", "High Torque", "Structure", "Grips", "Polar", "Matrices", "Singularity", "Safety", "CERTIFICACIÓN 12"] },
            { n: "Visión Artificial", l: ["Resolución", "Espacios Color", "OpenCV", "Threshold", "Edges", "Contours", "Color Tracking", "Filtros", "Histograma", "Face Detect", "OCR", "Calibración", "PiCam", "FPS", "Deep Learning", "CERTIFICACIÓN 13"] },
            { n: "IA Embebida", l: ["ML Intro", "Neuronas", "Training", "Datasets", "Edge AI", "TF Lite", "Regresión", "Clasificación", "Decisiones", "Fuzzy Logic", "NLP", "Agentes", "Optimización", "Models", "Hardware IA", "CERTIFICACIÓN 14"] },
            { n: "Middleware ROS", l: ["Arquitectura", "Topics", "Messages", "Services", "Params", "Launch", "Catkin", "Gazebo", "Rviz", "TF2", "URDF", "Actions", "Bags", "Pub/Sub", "Multi-robot", "CERTIFICACIÓN 15"] },
            { n: "Linux Embebido", l: ["Terminal", "Filesystem", "Permisos", "SSH", "Bash", "Packages", "Cron", "C++ Comp.", "Python", "GPIO", "Network", "Processes", "Monitor", "Kernel", "Embed Linux", "CERTIFICACIÓN 16"] },
            { n: "Gestión Energía", l: ["Química", "Descarga C", "Balanceo", "PCM", "Buck/Boost", "LDO", "Efficiency", "Heat", "Solar", "Consumo", "Picos", "Galvanic", "Gauges", "EMI", "Power", "CERTIFICACIÓN 17"] },
            { n: "Normativa ISO", l: ["Asimov", "ISO 10218", "Safety", "Privacy", "IP", "Patents", "Environment", "Obsolescence", "Social", "Liability", "Standards", "Docs", "Costs", "Marketing", "Ethics", "CERTIFICACIÓN 18"] },
            { n: "Proyecto Final", l: ["Problema", "Estado Arte", "Presupuesto", "Gantt", "Conceptual", "BOM", "Modeling", "POC", "Iteration", "HW Final", "SW Final", "Integración", "User Manual", "Pitch", "Demo", "CERTIFICACIÓN 19"] },
            { n: "Maestro Ingeniero", l: ["GitHub", "LinkedIn", "Resume", "Interviews", "Code Test", "Branding", "Networking", "Soft Skills", "English", "Freelance", "Portafolio", "Management", "Innovation", "Master", "Business", "MAESTRO FINAL"] }
        ];

        let state = { xp: 0, lives: 5, completed: [], user: null };
        let active = null;
        let isChecking = false;

        // --- INICIO ---
        function init() {
            renderMap();
            updateUI();
        }

        function renderMap() {
            const map = document.getElementById('map-content');
            map.innerHTML = "";
            let globalIdx = 0;

            CURRICULUM.forEach((phase, pIdx) => {
                const head = document.createElement('div');
                head.className = "w-full text-center mt-12 mb-6";
                head.innerHTML = `<h3 class="bg-slate-900 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest">${phase.n}</h3>`;
                map.appendChild(head);

                const grid = document.createElement('div');
                grid.className = "flex flex-col items-center gap-6";

                phase.l.forEach((name, lIdx) => {
                    const id = `f${pIdx}l${lIdx}`;
                    const isDone = state.completed.includes(id);
                    const isNow = state.completed.length === globalIdx;
                    const isLock = state.completed.length < globalIdx;

                    const btn = document.createElement('button');
                    btn.className = `w-14 h-14 rounded-full border-b-4 flex items-center justify-center font-bold text-sm shadow-lg transition-all relative z-10 
                        ${isDone ? 'node-completed' : (isNow ? 'node-current' : 'node-locked')}`;
                    
                    btn.innerText = (lIdx + 1);
                    btn.style.transform = `translateX(${Math.sin(globalIdx * 0.8) * 50}px)`;
                    
                    if(!isLock) btn.onclick = () => openLesson(id, name, phase.n);
                    grid.appendChild(btn);
                    globalIdx++;
                });
                map.appendChild(grid);
            });
            setTimeout(drawLines, 200);
        }

        function drawLines() {
            const canvas = document.getElementById('path-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = document.getElementById('app-container').scrollHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = "#cbd5e1";
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 5]);

            const nodes = document.querySelectorAll('#map-content button');
            nodes.forEach((n, i) => {
                const r = n.getBoundingClientRect();
                const x = r.left + r.width/2;
                const y = r.top + r.height/2 + window.scrollY;
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        window.openLesson = (id, title, pName) => {
            if(state.lives <= 0) return alert("SISTEMA BLOQUEADO: Recarga energía.");
            active = { id, title, pName, selected: null, q: getTechnicalQuestion(title) };
            isChecking = false;
            document.getElementById('lesson-overlay').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = title;
            document.getElementById('lesson-q').innerText = active.q.q;
            
            const opts = document.getElementById('quiz-options');
            opts.innerHTML = "";
            active.q.o.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = "p-4 border rounded-xl text-left bg-white font-semibold text-slate-700 hover:bg-slate-50";
                b.innerText = t;
                b.onclick = () => {
                    if(isChecking) return;
                    document.querySelectorAll('#quiz-options button').forEach(x => x.classList.remove('ring-2', 'ring-blue-500'));
                    b.classList.add('ring-2', 'ring-blue-500');
                    active.selected = i;
                };
                opts.appendChild(b);
            });
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('check-btn').innerText = "ANALIZAR";
        };

        function getTechnicalQuestion(title) {
            return {
                q: `Para la competencia "${title}", ¿cuál es el criterio técnico fundamental para garantizar la integridad y estabilidad del sistema?`,
                o: ["Filtrado de armónicos y desacoplo", "Optimización de lazo cerrado (PID)", "Análisis de respuesta transitoria", "Cumplimiento de estándares EMI/RFI"],
                a: Math.floor(Math.random() * 4),
                e: "Análisis correcto. La integridad del sistema depende de la estabilidad paramétrica."
            };
        }

        window.handleInteraction = () => {
            if(isChecking) { closeLesson(); return; }
            if(active.selected === null) return;
            isChecking = true;
            const correct = active.selected === active.q.a;
            
            if(correct) {
                confetti({ particleCount: 50, spread: 60 });
                if(!state.completed.includes(active.id)) state.completed.push(active.id);
                state.xp += 100;
                document.getElementById('feedback-text').innerText = "✓ ANÁLISIS VÁLIDO. " + active.q.e;
                document.getElementById('feedback-box').className = "mt-6 p-4 rounded-xl border-l-4 bg-green-50 border-green-500 text-green-700";
            } else {
                state.lives--;
                document.getElementById('feedback-text').innerText = "✗ ERROR DE CÁLCULO. Se ha perdido integridad de vida.";
                document.getElementById('feedback-box').className = "mt-6 p-4 rounded-xl border-l-4 bg-red-50 border-red-500 text-red-700";
            }
            document.getElementById('feedback-box').classList.remove('hidden');
            document.getElementById('check-btn').innerText = "CONTINUAR";
            updateUI();
            renderMap();
        };

        window.closeLesson = () => document.getElementById('lesson-overlay').classList.add('hidden');

        function updateUI() {
            document.getElementById('stat-xp').innerText = state.xp;
            document.getElementById('stat-lives').innerText = state.lives;
            document.getElementById('modal-lives').innerText = state.lives;
        }

        init();
        window.onresize = drawLines;
    </script>
</body>
</html>
