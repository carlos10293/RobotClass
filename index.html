<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboClass - Ingeniería y Certificación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; user-select: none; overflow-x: hidden; }
        .btn-push { transition: all 0.1s; border-bottom: 4px solid; }
        .btn-push:active { transform: translateY(4px); border-bottom-width: 0px; margin-bottom: 4px; }
        .node-completed { background: #58cc02; border-color: #46a302; color: white; }
        .node-current { background: #1cb0f6; border-color: #1899d6; color: white; animation: pulse 2s infinite; }
        .node-locked { background: #e5e7eb; border-color: #d1d5db; color: #afafaf; }
        .node-cert { border-color: #ffc107; background: #fff3cd; color: #856404; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(28, 176, 246, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(28, 176, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(28, 176, 246, 0); }
        }
        #path-canvas { position: absolute; top: 0; left: 0; z-index: 0; pointer-events: none; opacity: 0.15; }
        .option-btn { transition: all 0.2s; border: 2px solid #e5e7eb; border-bottom-width: 4px; }
        .option-selected { border-color: #84d8ff; background-color: #ddf4ff; color: #1899d6; }
        .option-correct { border-color: #58cc02; background-color: #d7ffb8; color: #46a302; }
        .option-wrong { border-color: #ea2b2b; background-color: #ffdfe0; color: #ea2b2b; }
        .expert-mode { background-color: #0f172a !important; color: #38bdf8 !important; }
    </style>
</head>
<body id="main-body">

    <nav class="fixed top-0 left-0 w-full bg-white border-b-2 border-slate-200 z-50 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black text-blue-600 tracking-tighter">ROBOCLASS</span>
            <span id="badge-expert" class="hidden bg-slate-800 text-sky-400 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase border border-sky-400">Expert</span>
        </div>
        <div class="flex items-center gap-6 font-bold text-slate-600">
            <div class="flex items-center gap-2 text-orange-500" title="Racha diaria">
                <i class="fas fa-fire"></i> <span id="stat-streak">0</span>
            </div>
            <div class="flex items-center gap-2 text-blue-500" title="Experiencia">
                <i class="fas fa-bolt"></i> <span id="stat-xp">0</span>
            </div>
            <div class="flex items-center gap-2 text-rose-500" title="Vidas">
                <i class="fas fa-heart"></i> <span id="stat-lives">5</span>
            </div>
            <button onclick="showCertificates()"><i class="fas fa-award text-amber-500 text-xl"></i></button>
        </div>
    </nav>

    <div class="fixed top-16 left-0 w-full bg-white h-1.5 z-40">
        <div id="master-progress" class="h-full bg-green-500 transition-all duration-1000" style="width: 0%"></div>
    </div>

    <!-- Misión Activa -->
    <div id="mission-panel" class="fixed bottom-6 left-6 z-40 bg-white p-4 rounded-2xl shadow-2xl border-2 border-slate-200 max-w-xs hidden">
        <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Misión Activa</p>
        <h4 id="mission-title" class="font-bold text-slate-800 leading-tight">Misión Electrónica</h4>
        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden">
            <div id="mission-progress" class="h-full bg-blue-500 w-0 transition-all"></div>
        </div>
    </div>

    <main id="app-container" class="relative pt-24 pb-40 flex flex-col items-center min-h-screen">
        <canvas id="path-canvas"></canvas>
        <div id="map-content" class="w-full max-w-xl flex flex-col items-center gap-12 relative px-4"></div>
    </main>

    <!-- Modal de Lección -->
    <div id="lesson-overlay" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <div class="h-16 border-b-2 flex items-center justify-between px-6">
            <button onclick="closeLesson()"><i class="fas fa-times text-2xl text-slate-400"></i></button>
            <div class="flex-1 mx-8 h-3 bg-slate-100 rounded-full overflow-hidden">
                <div id="lesson-bar" class="h-full bg-green-500 w-0 transition-all duration-500"></div>
            </div>
            <div class="text-rose-500 font-bold"><i class="fas fa-heart"></i> <span id="modal-lives">5</span></div>
        </div>
        <div class="flex-1 overflow-y-auto p-6 md:p-12">
            <div class="max-w-2xl mx-auto">
                <div class="flex items-center gap-3 mb-4">
                    <div id="badge-exam" class="hidden px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-black uppercase">
                        <i class="fas fa-graduation-cap"></i> Examen
                    </div>
                    <div id="diff-badge" class="px-3 py-1 rounded-full text-[10px] font-black uppercase"></div>
                </div>
                <h4 id="phase-label" class="text-blue-500 font-black uppercase text-xs tracking-widest mb-2"></h4>
                <h2 id="lesson-title" class="text-3xl font-black text-slate-800 mb-8 leading-tight"></h2>
                <div id="q-container" class="bg-white border-2 border-slate-200 rounded-3xl p-8 mb-8 shadow-sm">
                    <p id="lesson-question" class="text-xl font-bold text-slate-700 leading-relaxed"></p>
                </div>
                <div id="options-grid" class="grid gap-4"></div>
            </div>
        </div>
        <div id="footer-feedback" class="p-8 border-t-2 bg-white transition-all">
            <div class="max-w-2xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div id="feedback-text" class="hidden flex items-center gap-4 flex-1">
                    <div id="feedback-icon" class="w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl"></div>
                    <div>
                        <p id="feedback-status" class="font-black text-xl"></p>
                        <p id="feedback-msg" class="text-slate-600 font-bold text-sm"></p>
                    </div>
                </div>
                <button id="action-btn" onclick="checkAnswer()" class="btn-push w-full md:w-56 py-4 bg-blue-500 border-blue-700 text-white rounded-2xl font-black uppercase tracking-widest">Comprobar</button>
            </div>
        </div>
    </div>

    <!-- Modal Certificados -->
    <div id="cert-modal" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center p-6" onclick="this.classList.add('hidden')">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                <i class="fas fa-certificate text-amber-500"></i> Mis Certificados
            </h3>
            <div id="cert-list" class="space-y-3 max-h-96 overflow-y-auto"></div>
            <button onclick="document.getElementById('cert-modal').classList.add('hidden')" class="w-full mt-8 py-3 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-all">Cerrar</button>
        </div>
    </div>

    <script>
        const PHASES = [
            "1: Electricidad y Ley de Ohm", 
            "2: Componentes y Análisis", 
            "3: Electrónica Digital", 
            "4: Sensores", "5: Actuadores", 
            "6: Diseño de PCBs", "7: Mecánica y CAD", "8: Impresión 3D", "9: IoT y Cloud", "10: Sistemas de Control"
        ];

        // Integración de tus preguntas reales
        const CURRICULUM_DATA = {
            0: { // Fase 1: Electricidad (Preguntas 1-16...)
                0: { q: "¿Cuál es la unidad de medida de la diferencia de potencial eléctrico?", a: "Voltio", d: "facil", o: ["Amperio", "Ohmio", "Voltio", "Vatio"], ok: "El voltio define la fuerza electromotriz en un conductor.", ko: "Incorrecto." },
                1: { q: "¿Qué unidad se utiliza para medir la intensidad de la corriente eléctrica?", a: "Amperio", d: "facil", o: ["Voltio", "Amperio", "Julio", "Newton"], ok: "El amperio representa el flujo de electrones por segundo.", ko: "Incorrecto." },
                2: { q: "Según la Ley de Ohm, si la resistencia aumenta y el voltaje se mantiene igual, la corriente:", a: "Disminuye", d: "medio", o: ["Disminuye", "Aumenta", "Constante", "Negativa"], ok: "La corriente es inversamente proporcional a la resistencia.", ko: "Incorrecto." },
                3: { q: "¿Cuál es la unidad de medida de la resistencia eléctrica?", a: "Ohmio", d: "facil", o: ["Siemens", "Weber", "Ohmio", "Henrio"], ok: "El Ohmio mide la oposición al flujo eléctrico.", ko: "Incorrecto." },
                4: { q: "¿Qué componente se utiliza para limitar el paso de la corriente?", a: "Resistencia", d: "facil", o: ["Condensador", "Inductor", "Resistencia", "Diodo"], ok: "Correcto.", ko: "Incorrecto." },
                5: { q: "Si un circuito tiene 12 Voltios y 4 Ohmios, ¿cuántos Amperios circulan?", a: "3 Amperios", d: "medio", o: ["48 Amperios", "3 Amperios", "0.33 Amperios", "8 Amperios"], ok: "I = V / R = 12 / 4 = 3.", ko: "Incorrecto." },
                15: { q: "EXAMEN FINAL FASE 1: ¿Qué componente permite el paso de la corriente en un solo sentido?", a: "Diodo", d: "medio", o: ["Resistencia", "Condensador", "Diodo", "Inductor"], ok: "¡Certificado en Ley de Ohm obtenido!", ko: "Incorrecto." }
            },
            1: { // Fase 2: Componentes (Preguntas 51-66...)
                0: { q: "¿Qué sucede con la capacitancia total si conectamos dos condensadores iguales en paralelo?", a: "Se duplica su valor total", d: "medio", o: ["Se reduce a la mitad", "Se duplica su valor total", "Se mantiene igual", "Se vuelve cero"], ok: "En paralelo, las capacidades se suman.", ko: "Incorrecto." },
                1: { q: "¿Qué sucede con la capacitancia total si conectamos dos condensadores iguales en serie?", a: "Se reduce a la mitad", d: "medio", o: ["Se reduce a la mitad", "Se duplica", "Aumenta exponencialmente", "Se cancela"], ok: "Sigue la regla inversa a las resistencias.", ko: "Incorrecto." },
                2: { q: "¿Cómo se llama el tiempo que tarda una señal de C.A. en completar un ciclo?", a: "Periodo", d: "medio", o: ["Frecuencia", "Periodo", "Amplitud", "Fase"], ok: "Correcto.", ko: "Incorrecto." }
            },
            2: { // Fase 3: Digital (Preguntas 101-116...)
                0: { q: "¿Cómo se llama el sistema numérico que solo utiliza cero y uno?", a: "Sistema Binario", d: "facil", o: ["Sistema Decimal", "Sistema Binario", "Sistema Octal", "Sistema Hexadecimal"], ok: "La base de la electrónica digital.", ko: "Incorrecto." },
                1: { q: "¿Cuántos bits componen un Byte completo?", a: "8 bits", d: "facil", o: ["4 bits", "8 bits", "16 bits", "32 bits"], ok: "Correcto.", ko: "Incorrecto." },
                2: { q: "¿Cuál es la salida de una compuerta Y (AND) si sus dos entradas están en nivel bajo?", a: "Nivel bajo (Cero)", d: "medio", o: ["Nivel bajo (Cero)", "Nivel alto (Uno)", "Voltaje negativo", "Indeterminado"], ok: "AND requiere ambas entradas en alto para dar alto.", ko: "Incorrecto." }
            }
        };

        const MISSIONS = [
            { id: "electronica_master", title: "Maestría en Circuitos", phases: [0, 1, 2], reward: 500 }
        ];

        let state = JSON.parse(localStorage.getItem('robo_pro_v5')) || { 
            xp: 0, lives: 5, completed: [], streak: 0, lastDay: null, certificates: [], activeMission: MISSIONS[0] 
        };
        
        let active = null;
        let isEvaluating = false;

        function save() { localStorage.setItem('robo_pro_v5', JSON.stringify(state)); updateUI(); }

        function rewardXP(diff) {
            const table = { "facil": 50, "medio": 100, "dificil": 250 };
            return table[diff] || 100;
        }

        function checkStreak() {
            const today = new Date().toDateString();
            if (state.lastDay !== today) {
                if (state.lastDay === new Date(Date.now() - 86400000).toDateString()) {
                    state.streak++;
                } else {
                    state.streak = 1;
                }
                state.lastDay = today;
                save();
            }
        }

        function getQuestion(pIdx, lIdx) {
            if(CURRICULUM_DATA[pIdx] && CURRICULUM_DATA[pIdx][lIdx]) return CURRICULUM_DATA[pIdx][lIdx];
            
            // Generador por defecto si no hay datos específicos
            return {
                q: `Pregunta de refuerzo sobre ${PHASES[pIdx].split(': ')[1]}. ¿Es fundamental este concepto?`,
                a: "Sí, es esencial", d: "facil", o: ["Sí, es esencial", "No", "Tal vez", "Solo en teoría"],
                ok: "Correcto. El conocimiento base es vital.", ko: "Debes repasar la teoría."
            };
        }

        function renderMap() {
            const container = document.getElementById('map-content');
            container.innerHTML = "";
            let globalIdx = 0;

            PHASES.forEach((name, pIdx) => {
                const head = document.createElement('div');
                head.className = "w-full text-center mt-16";
                const completedInPhase = state.completed.filter(x => x.startsWith(`f${pIdx}`)).length;
                const progress = (completedInPhase / 16) * 100;
                
                head.innerHTML = `
                    <div class="flex flex-col items-center mb-4">
                        <div class="w-32 h-2 bg-slate-200 rounded-full overflow-hidden mb-2">
                            <div class="h-full bg-blue-500 transition-all" style="width: ${progress}%"></div>
                        </div>
                        <p class="text-blue-500 font-black text-[10px] uppercase tracking-widest">FASE ${pIdx + 1}</p>
                    </div>
                    <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">${name.split(': ')[1]}</h3>`;
                container.appendChild(head);

                for(let lIdx = 0; lIdx < 16; lIdx++) {
                    const id = `f${pIdx}l${lIdx}`;
                    const isCert = lIdx === 15;
                    const done = state.completed.includes(id);
                    const current = state.completed.length === globalIdx;
                    const locked = state.completed.length < globalIdx;

                    const node = document.createElement('button');
                    node.className = `w-14 h-14 rounded-full border-b-4 flex items-center justify-center font-black text-lg shadow-lg transition-all z-10 
                        ${done ? 'node-completed' : (current ? 'node-current' : 'node-locked')} ${isCert ? 'node-cert' : ''}`;
                    
                    node.innerHTML = isCert ? '<i class="fas fa-graduation-cap"></i>' : (lIdx + 1);
                    node.style.transform = `translateX(${Math.sin(globalIdx * 0.8) * 65}px)`;

                    if(!locked) node.onclick = () => openLesson(pIdx, lIdx, id);
                    container.appendChild(node);
                    globalIdx++;
                }
            });
            setTimeout(drawPath, 100);
        }

        function drawPath() {
            const canvas = document.getElementById('path-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = document.getElementById('app-container').scrollHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = state.xp > 5000 ? "#38bdf8" : "#e2e8f0"; 
            ctx.lineWidth = 6; ctx.setLineDash([15, 12]);
            const buttons = document.querySelectorAll('#map-content button');
            buttons.forEach((btn, i) => {
                const rect = btn.getBoundingClientRect();
                const x = rect.left + rect.width/2;
                const y = rect.top + rect.height/2 + window.scrollY;
                if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function openLesson(pIdx, lIdx, id) {
            if(state.lives <= 0) {
                alert("¡Sin vidas! Espera a que se recarguen.");
                return;
            }
            const data = getQuestion(pIdx, lIdx);
            active = { id, data, pIdx, lIdx, selected: null, correctIdx: data.o.indexOf(data.a) };
            isEvaluating = false;

            document.getElementById('lesson-overlay').classList.remove('hidden');
            document.getElementById('badge-exam').className = (lIdx === 15) ? "px-3 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-black uppercase" : "hidden";
            
            const dbadge = document.getElementById('diff-badge');
            dbadge.innerText = data.d;
            dbadge.className = `px-3 py-1 rounded-full text-[10px] font-black uppercase ${data.d === 'facil' ? 'bg-green-100 text-green-700' : data.d === 'medio' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`;

            document.getElementById('phase-label').innerText = PHASES[pIdx];
            document.getElementById('lesson-title').innerText = lIdx === 15 ? "Certificación Final" : `Lección ${lIdx + 1}`;
            document.getElementById('lesson-question').innerText = data.q;
            document.getElementById('lesson-bar').style.width = "0%";
            document.getElementById('feedback-text').classList.add('hidden');
            document.getElementById('footer-feedback').className = "p-8 border-t-2 bg-white";
            document.getElementById('action-btn').innerText = "Comprobar";
            document.getElementById('action-btn').className = "btn-push w-full md:w-56 py-4 bg-blue-500 border-blue-700 text-white rounded-2xl font-black uppercase";

            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            data.o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "option-btn p-5 rounded-2xl text-left font-bold text-slate-700 bg-white shadow-sm border-2";
                b.innerText = opt;
                b.onclick = () => {
                    if(isEvaluating) return;
                    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('option-selected'));
                    b.classList.add('option-selected');
                    active.selected = i;
                };
                grid.appendChild(b);
            });
        }

        function checkAnswer() {
            if(isEvaluating) { closeLesson(); return; }
            if(active.selected === null) return;

            isEvaluating = true;
            const isCorrect = active.selected === active.correctIdx;
            const btn = document.getElementById('action-btn');
            const footer = document.getElementById('footer-feedback');
            const feedback = document.getElementById('feedback-text');

            document.querySelectorAll('.option-btn').forEach((b, i) => {
                if(i === active.correctIdx) b.classList.add('option-correct');
                else if(i === active.selected) b.classList.add('option-wrong');
                b.disabled = true;
            });

            feedback.classList.remove('hidden');
            if(isCorrect) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.85 } });
                
                if(!state.completed.includes(active.id)) {
                    state.completed.push(active.id);
                    state.xp += rewardXP(active.data.d);
                    
                    if(active.lIdx === 15) {
                        const cert = PHASES[active.pIdx];
                        if(!state.certificates.includes(cert)) {
                            state.certificates.push(cert);
                            alert("🎓 ¡Certificado desbloqueado!: " + cert);
                        }
                    }
                }

                footer.className = "p-8 border-t-2 bg-green-50";
                document.getElementById('feedback-icon').className = "w-14 h-14 rounded-full flex items-center justify-center bg-green-500 text-white";
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('feedback-status').innerText = "¡Correcto!";
                document.getElementById('feedback-msg').innerText = active.data.ok;
                document.getElementById('lesson-bar').style.width = "100%";
                btn.className = "btn-push w-full md:w-56 py-4 bg-green-500 border-green-700 text-white rounded-2xl font-black uppercase";
                btn.innerText = "Continuar";
            } else {
                state.lives--;
                footer.className = "p-8 border-t-2 bg-rose-50";
                document.getElementById('feedback-icon').className = "w-14 h-14 rounded-full flex items-center justify-center bg-rose-500 text-white";
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-times"></i>';
                document.getElementById('feedback-status').innerText = "Error";
                document.getElementById('feedback-msg').innerText = active.data.ko;
                btn.className = "btn-push w-full md:w-56 py-4 bg-rose-500 border-rose-700 text-white rounded-2xl font-black uppercase";
                btn.innerText = "Entendido";
            }
            save();
            renderMap();
        }

        function showCertificates() {
            const list = document.getElementById('cert-list');
            list.innerHTML = state.certificates.length === 0 ? "<p class='text-slate-400 text-center py-4'>Aún no tienes certificados.</p>" : "";
            state.certificates.forEach(c => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-4 bg-amber-50 rounded-2xl border border-amber-200 mb-2";
                div.innerHTML = `<i class="fas fa-graduation-cap text-amber-500"></i> <span class="font-bold text-amber-900">${c}</span>`;
                list.appendChild(div);
            });
            document.getElementById('cert-modal').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('stat-xp').innerText = state.xp.toLocaleString();
            document.getElementById('stat-lives').innerText = state.lives;
            document.getElementById('stat-streak').innerText = state.streak;
            document.getElementById('modal-lives').innerText = state.lives;
            document.getElementById('master-progress').style.width = `${(state.completed.length / (PHASES.length * 16)) * 100}%`;

            if (state.activeMission) {
                document.getElementById('mission-panel').classList.remove('hidden');
                document.getElementById('mission-title').innerText = state.activeMission.title;
                const donePhases = state.activeMission.phases.filter(p => state.certificates.includes(PHASES[p])).length;
                document.getElementById('mission-progress').style.width = `${(donePhases / state.activeMission.phases.length) * 100}%`;
            }

            if (state.xp >= 5000) {
                document.getElementById('main-body').classList.add('expert-mode');
                document.getElementById('badge-expert').classList.remove('hidden');
            }
        }

        function closeLesson() { document.getElementById('lesson-overlay').classList.add('hidden'); }

        window.onload = () => { checkStreak(); renderMap(); updateUI(); };
        window.onresize = drawPath;
    </script>
</body>
</html>
