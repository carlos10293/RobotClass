<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster - Pro Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=JetBrains+Mono&display=swap');
        
        :root {
            --duo-green: #58cc02;
            --duo-blue: #1cb0f6;
            --duo-red: #ff4b4b;
            --duo-yellow: #ffc800;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #0f172a; 
            color: white;
            user-select: none;
            overflow-x: hidden;
        }

        .node {
            width: 80px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 6px solid rgba(0,0,0,0.2);
            z-index: 10;
        }

        .node:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
        }

        .node-locked { background: #334155; border-color: #1e293b; color: #64748b; cursor: not-allowed; }
        .node-active { background: var(--duo-blue); border-color: #1a8cc4; color: white; box-shadow: 0 0 20px rgba(28, 176, 246, 0.4); }
        .node-done { background: var(--duo-green); border-color: #46a302; color: white; }

        .path-line {
            position: absolute;
            height: 8px;
            background: #334155;
            z-index: 1;
            transform-origin: left center;
        }

        .option-card {
            border: 2px solid #334155;
            transition: all 0.2s;
            cursor: pointer;
        }

        .option-card:hover { background: rgba(255,255,255,0.05); border-color: #475569; }
        .option-selected { border-color: var(--duo-blue); background: rgba(28,176,246,0.1); }
        
        .feedback-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 100;
        }

        .feedback-show { transform: translateY(0); }

        .life-heart { color: var(--duo-red); transition: transform 0.3s; }
        .heart-pop { transform: scale(1.5); }

        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <nav class="fixed top-0 w-full bg-[#0f172a] border-b border-slate-800 z-50 p-4 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <i class="fas fa-fire text-orange-500 text-xl"></i>
                <span id="stat-streak" class="font-black text-slate-300">1</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-bolt text-yellow-400 text-xl"></i>
                <span id="stat-xp" class="font-black text-slate-300">0</span>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full">
            <i class="fas fa-heart life-heart" id="heart-icon"></i>
            <span id="stat-lives" class="font-black">5</span>
        </div>
    </nav>

    <!-- Map View -->
    <main id="view-map" class="pt-24 pb-32 flex flex-col items-center min-h-screen relative">
        <div id="map-container" class="w-full max-w-md relative flex flex-col items-center gap-12">
            <!-- Nodes will be injected here -->
        </div>
    </main>

    <!-- Quiz Overlay -->
    <div id="view-quiz" class="fixed inset-0 bg-[#0f172a] z-[60] hidden flex flex-col">
        <header class="p-4 flex items-center gap-4">
            <button onclick="exitQuiz()" class="text-slate-400 text-2xl p-2"><i class="fas fa-times"></i></button>
            <div class="flex-1 h-4 bg-slate-800 rounded-full overflow-hidden">
                <div id="quiz-progress" class="h-full bg-duo-green transition-all duration-500" style="width: 0%"></div>
            </div>
        </header>

        <main class="flex-1 p-6 overflow-y-auto">
            <div id="question-content" class="max-w-xl mx-auto py-8">
                <!-- Question injected here -->
            </div>
        </main>

        <!-- Feedback UI -->
        <div id="feedback-panel" class="feedback-panel p-6">
            <div class="max-w-xl mx-auto flex flex-col gap-4">
                <div id="feedback-message" class="flex items-center gap-4">
                    <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center text-2xl"></div>
                    <div>
                        <h3 id="feedback-title" class="font-black text-xl"></h3>
                        <p id="feedback-text" class="text-sm opacity-90"></p>
                    </div>
                </div>
                <button id="btn-continue" class="w-full py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">
                    Continuar
                </button>
            </div>
        </div>
    </nav>

    <script>
        // DATA SET
        const LEVELS = [
            { id: 1, title: "Fundamentos Atómicos", icon: "atom", questions: [
                {
                    q: "¿Qué sucede con la resistencia de un conductor si duplicamos su longitud (L) manteniendo el área constante?",
                    options: ["Se reduce a la mitad", "Se mantiene igual", "Se duplica", "Aumenta exponencialmente"],
                    correct: 2,
                    why: "La resistencia es directamente proporcional a la longitud ($R = ρ \cdot L / A$). A mayor camino para los electrones, mayor oposición."
                },
                {
                    q: "En un átomo de silicio, ¿cuántos electrones hay en la banda de valencia?",
                    options: ["2", "4", "8", "14"],
                    correct: 1,
                    why: "El Silicio es un semiconductor del grupo IV, por lo tanto posee 4 electrones en su última capa, permitiendo formar estructuras cristalinas."
                }
            ]},
            { id: 2, title: "Análisis de Redes", icon: "project-diagram", questions: [
                {
                    q: "Según la Ley de Corrientes de Kirchhoff (KCL), la suma de corrientes en un nodo es:",
                    options: ["Igual al voltaje de fuente", "Cero", "Infinita", "Proporcional a la resistencia"],
                    correct: 1,
                    why: "Principio de conservación de la carga: toda la corriente que entra a un punto debe salir de él. ΣI = 0."
                }
            ]},
            { id: 3, title: "Semiconductores", icon: "microchip", questions: [
                {
                    q: "¿Cuál es la caída de tensión aproximada en un diodo de Silicio en polarización directa?",
                    options: ["0.3V", "0.7V", "1.2V", "5.0V"],
                    correct: 1,
                    why: "Es la barrera de potencial estándar necesaria para vencer la zona de deplexión en uniones PN de silicio."
                }
            ]},
            { id: 4, title: "Transistores BJT", icon: "wave-square", questions: [] },
            { id: 5, title: "Amplificadores OP", icon: "mountain", questions: [] }
        ];

        const state = {
            xp: 0,
            lives: 5,
            streak: 1,
            completed: [],
            activeQuiz: null,
            currentQIdx: 0,
            selectedIdx: null
        };

        // UI RENDERERS
        function renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            
            LEVELS.forEach((level, index) => {
                const isDone = state.completed.includes(level.id);
                const isLocked = index > 0 && !state.completed.includes(LEVELS[index-1].id);
                const statusClass = isDone ? 'node-done' : (isLocked ? 'node-locked' : 'node-active');
                
                // Zig zag offset
                const offset = Math.sin(index) * 60;

                const nodeHtml = `
                    <div class="relative flex flex-col items-center" style="transform: translateX(${offset}px)">
                        <div onclick="startLevel(${level.id})" class="node ${statusClass}">
                            <i class="fas fa-${level.icon} text-2xl"></i>
                        </div>
                        <span class="mt-2 font-black text-xs uppercase tracking-tighter text-slate-500">${level.title}</span>
                    </div>
                `;
                container.innerHTML += nodeHtml;
            });
        }

        function startLevel(id) {
            const level = LEVELS.find(l => l.id === id);
            const index = LEVELS.indexOf(level);
            if (index > 0 && !state.completed.includes(LEVELS[index-1].id)) return;

            state.activeQuiz = level;
            state.currentQIdx = 0;
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.activeQuiz.questions[state.currentQIdx];
            const progress = (state.currentQIdx / state.activeQuiz.questions.length) * 100;
            document.getElementById('quiz-progress').style.width = `${progress}%`;
            
            state.selectedIdx = null;
            const container = document.getElementById('question-content');
            
            container.innerHTML = `
                <h2 class="text-2xl font-black mb-8 leading-tight animate-in fade-in slide-in-from-top-4">${q.q}</h2>
                <div class="grid gap-4">
                    ${q.options.map((opt, i) => `
                        <div onclick="selectOption(${i})" id="opt-${i}" 
                             class="option-card p-5 rounded-2xl font-bold flex items-center gap-4 border-2">
                            <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-xs">${i+1}</div>
                            <span>${opt}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            // Reset feedback
            const panel = document.getElementById('feedback-panel');
            panel.className = 'feedback-panel p-6';
            panel.classList.remove('feedback-show');
        }

        window.selectOption = (idx) => {
            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('option-selected'));
            document.getElementById(`opt-${idx}`).classList.add('option-selected');
            state.selectedIdx = idx;
            showCheckButton();
        };

        function showCheckButton() {
            const panel = document.getElementById('feedback-panel');
            panel.innerHTML = `
                <div class="max-w-xl mx-auto">
                    <button onclick="validateAnswer()" class="w-full py-4 bg-[#1cb0f6] text-white rounded-2xl font-black uppercase tracking-widest shadow-[0_4px_0_#1a8cc4] active:shadow-none active:translate-y-1 transition-all">
                        Comprobar
                    </button>
                </div>
            `;
            panel.classList.add('feedback-show');
            panel.style.background = "#0f172a";
            panel.style.borderTop = "1px solid #334155";
        }

        window.validateAnswer = () => {
            const q = state.activeQuiz.questions[state.currentQIdx];
            const isCorrect = state.selectedIdx === q.correct;
            const panel = document.getElementById('feedback-panel');
            
            const msgObj = isCorrect ? {
                bg: '#d7ffb8',
                color: '#58a700',
                title: '¡Excelente trabajo!',
                icon: 'fa-check-circle',
                btnClass: 'bg-[#58cc02] shadow-[0_4px_0_#46a302]'
            } : {
                bg: '#ffdfe0',
                color: '#ea2b2b',
                title: 'Solución técnica:',
                icon: 'fa-times-circle',
                btnClass: 'bg-[#ff4b4b] shadow-[0_4px_0_#d43535]'
            };

            if (!isCorrect) {
                state.lives--;
                updateStats();
                if(state.lives <= 0) { alert("¡Sin vidas! Repasando..."); exitQuiz(); return; }
            } else {
                state.xp += 50;
                updateStats();
                confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
            }

            panel.style.background = msgObj.bg;
            panel.innerHTML = `
                <div class="max-w-xl mx-auto flex flex-col gap-4">
                    <div class="flex items-start gap-4" style="color: ${msgObj.color}">
                        <i class="fas ${msgObj.icon} text-4xl"></i>
                        <div>
                            <h3 class="font-black text-xl">${msgObj.title}</h3>
                            <p class="text-sm font-bold opacity-80">${q.why}</p>
                        </div>
                    </div>
                    <button onclick="handleContinue()" class="w-full py-4 text-white rounded-2xl font-black uppercase tracking-widest ${msgObj.btnClass} active:shadow-none active:translate-y-1 transition-all">
                        Continuar
                    </button>
                </div>
            `;
        };

        window.handleContinue = () => {
            if (state.currentQIdx < state.activeQuiz.questions.length - 1) {
                state.currentQIdx++;
                renderQuestion();
            } else {
                finishLevel();
            }
        };

        function finishLevel() {
            state.completed.push(state.activeQuiz.id);
            exitQuiz();
            renderMap();
        }

        function exitQuiz() {
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
        }

        function updateStats() {
            document.getElementById('stat-xp').innerText = state.xp;
            document.getElementById('stat-lives').innerText = state.lives;
            const heart = document.getElementById('heart-icon');
            heart.classList.add('heart-pop');
            setTimeout(() => heart.classList.remove('heart-pop'), 300);
        }

        // Init
        renderMap();
        updateStats();

    </script>
</body>
</html>
