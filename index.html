<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster PRO - Engineering Academy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800;900&display=swap');
        
        :root { 
            --primary: #3b82f6; 
            --success: #10b981; 
            --bg-dark: #020617;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        .node-active { transform: scale(1.1); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
        
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-push { 
            transition: all 0.1s; 
            border-bottom-width: 4px;
        }
        .btn-push:active { 
            transform: translateY(2px); 
            border-bottom-width: 0px; 
            margin-bottom: 2px;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .loading-pulse { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-4">
        <div class="w-full max-w-md space-y-8 text-center">
            <div class="space-y-2">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-600 shadow-2xl shadow-blue-500/20 mb-4">
                    <i class="fas fa-microchip text-4xl text-white"></i>
                </div>
                <h1 class="text-4xl font-black tracking-tighter italic uppercase">ElectroMaster <span class="text-blue-500">PRO</span></h1>
                <p class="text-slate-400">Certificación en Ingeniería Electrónica</p>
            </div>

            <div class="glass p-8 rounded-[2rem] space-y-4">
                <div class="space-y-2 text-left">
                    <label class="text-xs font-bold uppercase text-slate-500 ml-2">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:ring-2 ring-blue-500 outline-none transition-all" placeholder="ing@universidad.edu">
                </div>
                <div class="space-y-2 text-left">
                    <label class="text-xs font-bold uppercase text-slate-500 ml-2">Contraseña</label>
                    <input type="password" id="pass" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl focus:ring-2 ring-blue-500 outline-none transition-all" placeholder="••••••••">
                </div>
                
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="actions.login()" class="py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all btn-push border-blue-800">ENTRAR</button>
                    <button onclick="actions.register()" class="py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold transition-all btn-push border-slate-950 text-slate-300 text-sm">REGISTRARSE</button>
                </div>

                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-900 px-2 text-slate-500">O accede como</span></div>
                </div>

                <button onclick="actions.loginAnon()" class="w-full py-4 border border-slate-800 rounded-2xl font-bold hover:bg-white/5 transition-all">
                    <i class="fas fa-user-secret mr-2"></i>INVITADO (Temporal)
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN UI (Hidden by default) -->
    <div id="main-ui" class="hidden">
        <!-- TOP NAV -->
        <nav class="fixed top-0 left-0 right-0 h-20 glass z-50 px-6 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <span id="user-name" class="font-black italic text-sm text-blue-400 leading-none">INGENIERO</span>
                    <span id="user-rank" class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Novato Nivel 1</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="glass px-4 py-2 rounded-full flex items-center gap-2 border-blue-500/20">
                    <i class="fas fa-bolt text-yellow-400"></i>
                    <span id="user-xp" class="font-mono font-bold">0 XP</span>
                </div>
                <button onclick="actions.logout()" class="w-10 h-10 rounded-full glass border-red-500/20 text-red-400 flex items-center justify-center">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
            </div>
        </nav>

        <!-- CONTENT AREA -->
        <main id="app-router" class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-8">
            <!-- Dynamic Content -->
        </main>
    </div>

    <!-- SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'electromaster-pro';

        const CURRICULUM = [
            { id: 'm1', title: 'Fundamentos', icon: 'bolt', diff: 'BÁSICO', questions: [
                { q: "¿Cuál es la unidad de medida de la diferencia de potencial?", o: ["Amperio", "Voltio", "Ohmio"], a: 1 },
                { q: "¿Qué componente se opone al flujo de corriente?", o: ["Resistor", "Capacitor", "Diodo"], a: 0 }
            ]},
            { id: 'm2', title: 'Leyes de Kirchhoff', icon: 'diagram-project', diff: 'INTERMEDIO', questions: [
                { q: "En un nodo, la suma de corrientes entrantes es...", o: ["Igual a la resistencia", "Igual a la suma saliente", "Cero"], a: 1 },
                { q: "La suma de voltajes en un lazo cerrado es...", o: ["Infinito", "Vcc", "Cero"], a: 2 }
            ]},
            { id: 'm3', title: 'Semiconductores', icon: 'microchip', diff: 'AVANZADO', questions: [
                { q: "¿Cuál es el voltaje de umbral típico de un diodo de silicio?", o: ["0.3V", "0.7V", "1.2V"], a: 1 },
                { q: "¿Qué material se añade al silicio para crear tipo P?", o: ["Fósforo", "Arsénico", "Boro"], a: 2 }
            ]},
            { id: 'm4', title: 'Transistores BJT', icon: 'tower-broadcast', diff: 'INGENIERÍA', questions: [
                { q: "¿Cómo se llama la terminal que controla el BJT?", o: ["Gate", "Base", "Ánodo"], a: 1 },
                { q: "En corte, un BJT actúa como...", o: ["Interruptor cerrado", "Interruptor abierto", "Amplificador"], a: 1 }
            ]},
            { id: 'm5', title: 'Op-Amps', icon: 'wave-square', diff: 'MAESTRÍA', questions: [
                { q: "¿Cuál es la ganancia ideal de un Op-Amp?", o: ["1", "1000", "Infinita"], a: 2 },
                { q: "Un seguidor de voltaje tiene ganancia de...", o: ["-1", "1", "0"], a: 1 }
            ]}
        ];

        let state = {
            user: null,
            view: 'map',
            activeQuiz: null,
            quizIdx: 0,
            score: 0
        };

        const ui = {
            renderMap() {
                let html = `<div class="space-y-4">
                    <h2 class="text-2xl font-black italic uppercase tracking-tight">Plan de Estudios</h2>
                    <p class="text-slate-500 text-sm">Completa los módulos para obtener tu certificación.</p>
                </div>
                <div class="grid gap-4">`;

                CURRICULUM.forEach((mod, idx) => {
                    const isDone = state.user?.completed?.includes(mod.id);
                    const isLocked = idx > 0 && !state.user?.completed?.includes(CURRICULUM[idx-1].id);

                    html += `
                        <div onclick="${isLocked ? '' : `actions.startQuiz('${mod.id}')`}" 
                             class="glass p-6 rounded-[2rem] flex items-center gap-6 transition-all cursor-pointer ${isLocked ? 'opacity-40 grayscale' : 'hover:border-blue-500/40'} ${isDone ? 'border-green-500/20' : ''}">
                            <div class="w-16 h-16 rounded-2xl ${isDone ? 'bg-green-500/10 text-green-500' : 'bg-blue-500/10 text-blue-500'} flex items-center justify-center text-2xl shadow-inner">
                                <i class="fas fa-${isLocked ? 'lock' : mod.icon}"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${mod.diff}</span>
                                    ${isDone ? '<span class="text-[10px] font-bold text-green-500 bg-green-500/10 px-2 py-0.5 rounded-full">COMPLETADO</span>' : ''}
                                </div>
                                <h3 class="font-black text-lg text-slate-200">${mod.title}</h3>
                                <p class="text-xs text-slate-500">${mod.questions.length} Preguntas Técnicas</p>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                document.getElementById('app-router').innerHTML = html;
            },

            renderQuiz() {
                const mod = state.activeQuiz;
                const q = mod.questions[state.quizIdx];
                const progress = ((state.quizIdx) / mod.questions.length) * 100;

                document.getElementById('app-router').innerHTML = `
                    <div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="flex items-center justify-between">
                            <button onclick="actions.setView('map')" class="text-slate-500"><i class="fas fa-arrow-left"></i></button>
                            <span class="font-black italic text-xs uppercase tracking-widest">${mod.title}</span>
                            <span class="font-mono text-xs text-blue-500">${state.quizIdx + 1}/${mod.questions.length}</span>
                        </div>
                        
                        <div class="h-2 w-full bg-slate-900 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600 progress-bar shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: ${progress}%"></div>
                        </div>

                        <div class="glass p-8 rounded-[2.5rem] space-y-8">
                            <h2 class="text-xl font-bold leading-relaxed text-slate-100">${q.q}</h2>
                            <div class="grid gap-3">
                                ${q.o.map((opt, i) => `
                                    <button onclick="actions.answer(${i})" class="w-full p-5 bg-slate-900/50 hover:bg-blue-600/10 border border-slate-800 rounded-2xl text-left transition-all hover:border-blue-500/50 font-medium group flex items-center gap-4">
                                        <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-500 group-hover:bg-blue-600 group-hover:text-white">${String.fromCharCode(65+i)}</div>
                                        ${opt}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            renderResult(score, total) {
                const passed = score === total;
                if(passed) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

                document.getElementById('app-router').innerHTML = `
                    <div class="text-center space-y-8 py-12 animate-in zoom-in duration-500">
                        <div class="inline-flex w-24 h-24 rounded-full ${passed ? 'bg-green-500' : 'bg-red-500'} items-center justify-center text-4xl shadow-2xl">
                            <i class="fas fa-${passed ? 'check' : 'times'} text-white"></i>
                        </div>
                        <div>
                            <h2 class="text-4xl font-black italic uppercase italic">${passed ? '¡Aprobado!' : 'No Aprobado'}</h2>
                            <p class="text-slate-500 mt-2">${passed ? 'Has dominado este módulo técnico.' : 'Necesitas un puntaje perfecto para avanzar.'}</p>
                        </div>
                        <div class="text-6xl font-black text-blue-500">${score}/${total}</div>
                        <button onclick="actions.setView('map')" class="w-full py-5 bg-blue-600 rounded-2xl font-black italic uppercase btn-push border-blue-800 shadow-xl shadow-blue-600/20">
                            VOLVER AL MAPA
                        </button>
                    </div>
                `;
            }
        };

        const actions = {
            async login() {
                const e = document.getElementById('email').value.trim();
                const p = document.getElementById('pass').value;
                if(!e || !p) return;
                try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Error: Email o contraseña incorrectos."); }
            },
            async register() {
                const e = document.getElementById('email').value.trim();
                const p = document.getElementById('pass').value;
                if(p.length < 6) return alert("Mínimo 6 caracteres");
                try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { 
                    if(err.code === 'auth/email-already-in-use') alert("Este correo ya existe, intenta iniciar sesión.");
                    else alert(err.message);
                }
            },
            async loginAnon() { try { await signInAnonymously(auth); } catch(err) { alert(err.message); } },
            logout() { signOut(auth).then(() => location.reload()); },
            
            setView(v) { state.view = v; ui.renderMap(); },
            
            startQuiz(id) {
                state.activeQuiz = CURRICULUM.find(m => m.id === id);
                state.quizIdx = 0;
                state.score = 0;
                ui.renderQuiz();
            },

            async answer(idx) {
                if(idx === state.activeQuiz.questions[state.quizIdx].a) state.score++;
                
                state.quizIdx++;
                if(state.quizIdx < state.activeQuiz.questions.length) {
                    ui.renderQuiz();
                } else {
                    const passed = state.score === state.activeQuiz.questions.length;
                    if(passed && !state.user.completed.includes(state.activeQuiz.id)) {
                        state.user.completed.push(state.activeQuiz.id);
                        state.user.xp += 1000;
                        await this.sync();
                    }
                    ui.renderResult(state.score, state.activeQuiz.questions.length);
                }
            },

            async sync() {
                if(!auth.currentUser) return;
                const ref = doc(db, 'artifacts', APP_ID, 'users', auth.currentUser.uid, 'profile', 'data');
                await setDoc(ref, state.user);
                this.updateUI();
            },

            updateUI() {
                document.getElementById('user-xp').innerText = `${state.user.xp} XP`;
                const rankName = state.user.xp > 5000 ? 'SENIOR' : state.user.xp > 2000 ? 'ESPECIALISTA' : 'NOVATO';
                document.getElementById('user-rank').innerText = `${rankName} NIVEL ${Math.floor(state.user.xp/1000) + 1}`;
            }
        };

        // EXPOSE TO WINDOW
        window.actions = actions;

        // AUTH LISTENER
        onAuthStateChanged(auth, async (user) => {
            const authEl = document.getElementById('auth-screen');
            const mainEl = document.getElementById('main-ui');
            
            if(user) {
                const ref = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data');
                const snap = await getDoc(ref);
                
                if(snap.exists()) {
                    state.user = snap.data();
                } else {
                    state.user = { xp: 0, completed: [], name: user.email?.split('@')[0] || 'Ingeniero' };
                    await setDoc(ref, state.user);
                }
                
                document.getElementById('user-name').innerText = state.user.name.toUpperCase();
                actions.updateUI();
                authEl.classList.add('hidden');
                mainEl.classList.remove('hidden');
                ui.renderMap();
            } else {
                authEl.classList.remove('hidden');
                mainEl.classList.add('hidden');
            }
        });

    </script>
</body>
</html>
