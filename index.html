<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJnameIjogIkVsZWN0cm9NYXN0ZXIgVjMgT05FIiwKICAic2hvcnRfbmFtZSI6ICJFbGVjdHJvTSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiaWNvbnMiOiBbIHsgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yOTA1LzI5MDUyMjIucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH0gXQp9">
    
    <title>ElectroMaster V3 - Pro Learning MVP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=JetBrains+Mono&display=swap');
        :root { --primary: #3b82f6; --bg-dark: #0f172a; }
        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-dark); color: white; user-select: none; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .node-active { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .lab-drop-zone { border: 2px dashed rgba(59, 130, 246, 0.4); transition: all 0.3s ease; }
        .lab-drop-zone.hover { background: rgba(59, 130, 246, 0.2); border-color: var(--primary); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auth Overlay -->
    <div id="authOverlay" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <i class="fas fa-bolt text-blue-500 text-7xl animate-bounce"></i>
            <h1 class="text-4xl font-black mt-4 italic">ELECTRO<span class="text-blue-500">MASTER</span></h1>
            <p class="text-slate-400 mt-2">Nivel MVP Comercial</p>
        </div>
        <button id="btnGoogleAuth" class="bg-white text-slate-950 px-8 py-4 rounded-2xl font-bold flex items-center gap-3 active:scale-95 transition-transform">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Iniciar con Google
        </button>
    </div>

    <!-- HUD -->
    <header id="hud" class="fixed top-0 w-full glass-panel z-50 px-4 py-3 flex justify-between items-center hidden">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                <i class="fas fa-heart text-red-500"></i>
                <span id="stat-lives" class="font-bold">5</span>
            </div>
            <div class="flex items-center gap-1 bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                <i class="fas fa-star text-yellow-400"></i>
                <span id="stat-xp" class="font-bold">0</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <img id="userAvatar" src="" class="w-8 h-8 rounded-full border-2 border-blue-500">
        </div>
    </header>

    <!-- Main -->
    <main id="appContent" class="flex-grow pt-20 pb-24 hidden">
        <section id="pathMap" class="flex flex-col items-center gap-8 py-8"></section>
    </main>

    <!-- Modal Pago WhatsApp (Sustituto Stripe para MVP rápido) -->
    <div id="premiumOverlay" class="fixed inset-0 z-[70] bg-slate-950/90 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl max-w-sm w-full text-center">
            <i class="fas fa-crown text-yellow-500 text-5xl mb-4"></i>
            <h3 class="text-2xl font-bold mb-2">Desbloquea el Nivel Pro</h3>
            <p class="text-slate-400 mb-6 text-sm">Obtén acceso a laboratorios avanzados y certificados verificados por solo $9.99 USD.</p>
            <button onclick="ui.payViaWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-xl"></i>
                Pagar vía WhatsApp
            </button>
            <button onclick="document.getElementById('premiumOverlay').classList.add('hidden')" class="mt-4 text-slate-500 text-sm">Más tarde</button>
        </div>
    </div>

    <!-- Modals Lab / Quiz (Simplified for logic) -->
    <div id="labOverlay" class="fixed inset-0 z-[60] bg-slate-950 hidden flex flex-col p-6">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-black"><i class="fas fa-flask mr-2 text-blue-500"></i>LAB INTERACTIVO</h2>
            <button onclick="ui.closeLab()" class="text-slate-400 text-2xl">&times;</button>
        </header>
        <div class="flex-grow flex flex-col items-center">
            <div id="circuitBoard" class="w-64 h-64 bg-slate-900 border-2 border-dashed border-slate-700 rounded-3xl relative mb-10">
                <div id="targetZone" class="lab-drop-zone absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-xl flex items-center justify-center">
                    <span class="text-[10px] text-slate-500">SOLTAR AQUÍ</span>
                </div>
            </div>
            <div id="dragResistor" draggable="true" class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center cursor-grab active:cursor-grabbing">
                <i class="fas fa-wave-square text-xl"></i>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full glass-panel py-4 px-8 flex justify-around border-t border-slate-800 hidden" id="mainNav">
        <button class="text-blue-500 text-2xl"><i class="fas fa-home"></i></button>
        <button onclick="ui.openLab()" class="text-slate-400 text-2xl"><i class="fas fa-flask"></i></button>
        <button onclick="document.getElementById('premiumOverlay').classList.remove('hidden')" class="text-yellow-500 text-2xl"><i class="fas fa-crown"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'electromaster-v3';

        const state = {
            xp: 0,
            lives: 5,
            completed: []
        };

        const modules = [
            { id: 'm1', title: 'Fundamentos', type: 'theory' },
            { id: 'm2', title: 'Lab 1: Resistencia', type: 'lab' },
            { id: 'm3', title: 'Certificación', type: 'exam' }
        ];

        window.ui = {
            updateHUD: () => {
                document.getElementById('stat-xp').textContent = state.xp;
                document.getElementById('stat-lives').textContent = state.lives;
            },
            renderMap: () => {
                const container = document.getElementById('pathMap');
                container.innerHTML = '';
                modules.forEach(m => {
                    const btn = document.createElement('button');
                    btn.className = `w-20 h-20 rounded-full border-4 ${state.completed.includes(m.id) ? 'bg-green-600 border-green-400' : 'bg-blue-600 border-blue-400'} text-white text-2xl mb-2`;
                    btn.innerHTML = `<i class="fas ${m.type === 'theory' ? 'fa-book' : 'fa-flask'}"></i>`;
                    btn.onclick = () => m.type === 'lab' ? ui.openLab() : ui.completeModule(m.id);
                    container.appendChild(btn);
                    const label = document.createElement('span');
                    label.className = "text-xs font-bold text-slate-500 mb-6";
                    label.textContent = m.title;
                    container.appendChild(label);
                });
            },
            completeModule: async (id) => {
                if (!state.completed.includes(id)) {
                    state.completed.push(id);
                    state.xp += 100;
                    ui.updateHUD();
                    ui.renderMap();
                    await saveProgress();
                    confetti();
                }
            },
            openLab: () => document.getElementById('labOverlay').classList.remove('hidden'),
            closeLab: () => document.getElementById('labOverlay').classList.add('hidden'),
            
            // LÓGICA DE WHATSAPP PARA PAGOS
            payViaWhatsApp: () => {
                const phone = "5215500000000"; // Tu número real aquí
                const message = encodeURIComponent(`¡Hola! Quiero activar mi cuenta Pro en ElectroMaster V3.\nMi ID de usuario es: ${auth.currentUser.uid}\nCorreo: ${auth.currentUser.email}`);
                window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
            }
        };

        const saveProgress = async () => {
            if (!auth.currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'profile', 'progress');
            await setDoc(ref, { xp: state.xp, lives: state.lives, completed: state.completed }, { merge: true });
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authOverlay').classList.add('hidden');
                document.querySelectorAll('#hud, #appContent, #mainNav').forEach(el => el.classList.remove('hidden'));
                document.getElementById('userAvatar').src = user.photoURL;
                
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'progress'));
                if (snap.exists()) {
                    Object.assign(state, snap.data());
                }
                ui.updateHUD();
                ui.renderMap();
            }
        });

        document.getElementById('btnGoogleAuth').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        // Lab Interactions
        const dragItem = document.getElementById('dragResistor');
        const dropZone = document.getElementById('targetZone');

        dragItem.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', 'component'));
        dropZone.addEventListener('dragover', (e) => e.preventDefault());
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.innerHTML = `<i class="fas fa-check text-green-500 text-3xl"></i>`;
            ui.completeModule('m2');
            setTimeout(() => ui.closeLab(), 1500);
        });

    </script>
</body>
</html>
