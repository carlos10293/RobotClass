<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster - Segmentación de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f9fafb;
            color: #374151;
            overflow-x: hidden;
        }

        .duo-card {
            border: 2px solid #e5e7eb;
            border-bottom: 6px solid #e5e7eb;
            transition: all 0.15s ease;
        }

        .duo-card:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        .onboarding-screen {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .node-btn {
            width: 80px; height: 75px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            cursor: pointer; position: relative;
            margin-bottom: 30px;
        }
        .current { background: #58cc02; border-bottom: 6px solid #46a302; }
        .locked { background: #e5e7eb; border-bottom: 6px solid #d1d5db; }
    </style>
</head>
<body>

    <!-- Pantalla de Selección de Cliente (Onboarding) -->
    <div id="onboarding" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl mx-auto shadow-xl mb-4">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-800">¡Bienvenido a ElectroMaster!</h1>
            <p class="text-gray-500 font-bold mt-2">¿Cómo planeas usar la plataforma hoy?</p>
        </div>

        <div class="grid w-full max-w-sm gap-4">
            <!-- Opción: Personas -->
            <button onclick="app.setRole('user')" class="duo-card p-6 rounded-3xl flex items-center gap-4 hover:bg-blue-50 border-blue-100 group">
                <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    <i class="fas fa-user"></i>
                </div>
                <div class="text-left">
                    <h3 class="font-black text-lg">Soy Estudiante</h3>
                    <p class="text-xs font-bold text-gray-400 leading-none">Quiero certificarme y ganar más.</p>
                </div>
            </button>

            <!-- Opción: Empresas -->
            <button onclick="app.setRole('business')" class="duo-card p-6 rounded-3xl flex items-center gap-4 hover:bg-indigo-50 border-indigo-100 group">
                <div class="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i class="fas fa-building"></i>
                </div>
                <div class="text-left">
                    <h3 class="font-black text-lg">Soy Empresa</h3>
                    <p class="text-xs font-bold text-gray-400 leading-none">Capacitar a mi equipo técnico.</p>
                </div>
            </button>
        </div>
        
        <p class="mt-10 text-[10px] font-black text-gray-300 uppercase tracking-widest">Startup de Impacto Social Certificada</p>
    </div>

    <!-- App Principal -->
    <nav class="fixed top-0 w-full bg-white border-b-2 border-gray-100 z-50 px-4 py-3 hidden" id="main-nav">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span id="role-icon" class="text-blue-600"><i class="fas fa-user"></i></span>
                <h1 class="font-black text-lg leading-none" id="app-title">ElectroMaster</h1>
            </div>
            <div class="flex gap-4 font-black">
                <span class="text-orange-500"><i class="fas fa-fire"></i> 1</span>
                <span class="text-blue-500"><i class="fas fa-gem"></i> 0</span>
            </div>
        </div>
    </nav>

    <main id="main-content" class="pt-24 pb-12 px-4 max-w-xl mx-auto hidden">
        <div id="banner-role" class="p-6 rounded-3xl mb-8 border-2">
            <!-- Se llena dinámicamente -->
        </div>

        <div id="map" class="flex flex-col items-center">
            <!-- Mapa de niveles -->
        </div>
    </main>

    <script>
        const app = {
            setRole(role) {
                document.getElementById('onboarding').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                const banner = document.getElementById('banner-role');
                const title = document.getElementById('app-title');
                const icon = document.getElementById('role-icon');

                if(role === 'user') {
                    banner.className = "p-6 rounded-3xl mb-8 border-2 border-blue-100 bg-blue-50";
                    banner.innerHTML = `
                        <h2 class="font-black text-blue-800 text-lg">Ruta de Empleabilidad</h2>
                        <p class="text-sm font-bold text-blue-600">Completa los 5 módulos para obtener tu certificado DC-3 avalado por la STPS.</p>
                    `;
                    title.innerText = "Mi Carrera";
                    icon.innerHTML = '<i class="fas fa-user"></i>';
                } else {
                    banner.className = "p-6 rounded-3xl mb-8 border-2 border-indigo-100 bg-indigo-50";
                    banner.innerHTML = `
                        <h2 class="font-black text-indigo-800 text-lg">Panel Corporativo</h2>
                        <p class="text-sm font-bold text-indigo-600">Gestiona las licencias de tu personal y monitorea su progreso técnico.</p>
                    `;
                    title.innerText = "Electro Master B2B";
                    icon.innerHTML = '<i class="fas fa-building"></i>';
                }
                this.renderMap();
            },

            renderMap() {
                const map = document.getElementById('map');
                map.innerHTML = '';
                const levels = ['Introducción', 'Seguridad', 'Motores', 'PLC Básico', 'Examen Final'];
                levels.forEach((l, i) => {
                    const node = document.createElement('div');
                    node.className = `node-btn ${i === 0 ? 'current' : 'locked'}`;
                    node.style.left = `${Math.sin(i) * 50}px`;
                    node.innerHTML = i === 0 ? '<i class="fas fa-play"></i>' : '<i class="fas fa-lock"></i>';
                    
                    const label = document.createElement('div');
                    label.className = "absolute -bottom-6 font-black text-[10px] text-gray-400 uppercase tracking-tighter whitespace-nowrap";
                    label.innerText = l;
                    node.appendChild(label);
                    
                    map.appendChild(node);
                });
            }
        };
    </script>
</body>
</html>
